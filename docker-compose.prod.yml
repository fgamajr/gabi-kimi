services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gabi-kimi-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gabi}
      POSTGRES_USER: ${POSTGRES_USER:-gabi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gabi}
    volumes:
      - ${GABI_HOST_DATA_ROOT:-/mnt/HC_Volume_105154890}/postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: gabi-kimi-backend
    container_name: gabi-kimi-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      BACKEND_INTERNAL_PORT: 8000
      PYTHONPATH: /opt/app
      POSTGRES_URL: ${POSTGRES_URL:-postgresql://gabi:gabi@postgres:5432/gabi}
      GABI_ALLOWED_HOSTS: ${GABI_ALLOWED_HOSTS:-gabidou.top,www.gabidou.top,localhost,127.0.0.1,backend}
      GABI_CORS_ORIGINS: ${GABI_CORS_ORIGINS:-https://gabidou.top,https://www.gabidou.top}
      GABI_CORS_ALLOW_CREDENTIALS: ${GABI_CORS_ALLOW_CREDENTIALS:-false}
      GABI_EXPOSE_API_DOCS: ${GABI_EXPOSE_API_DOCS:-false}
      GABI_PUBLIC_HEALTH_DETAILS: ${GABI_PUBLIC_HEALTH_DETAILS:-false}
      RERANKER_URL: ${RERANKER_URL:-http://reranker:8902}
      EMBED_SERVER_URL: ${EMBED_SERVER_URL:-http://qwen-embed:8900}
      EMBED_DIMS: ${EMBED_DIMS:-384}
      # RAG / answering (see docs/RAG_14DAY_RUNBOOK.md — set RAG_ENABLED=true in server .env)
      RAG_ENABLED: ${RAG_ENABLED:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SPA_DIST_DIR: /shared/dist
      SITE_URL: ${SITE_URL:-https://gabidou.top}
    working_dir: /opt/app
    command: ["sh", "/opt/container-scripts/backend-prod.sh"]
    volumes:
      - ${GABI_HOST_DATA_ROOT:-/mnt/HC_Volume_105154890}/dou_data:/data/gabi_dou
      - frontend_dist:/shared/dist:ro
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/live', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - edge
      - internal

  dev-converge-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: gabi-kimi-backend
    container_name: gabi-kimi-dev-converge-api
    restart: unless-stopped
    # TODO: dev-converge ainda usa Mongo internamente (DEV_CONVERGE_MONGO_STRING).
    # Migrar para Postgres antes de remover essa dependência definitivamente.
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DEV_CONVERGE_INTERNAL_PORT: 8000
      PYTHONPATH: /opt/app
      DEV_CONVERGE_MONGO_STRING: ${DEV_CONVERGE_MONGO_STRING:-mongodb://mongo:27017/gabi_dou}
      DEV_CONVERGE_DB_NAME: ${DEV_CONVERGE_DB_NAME:-gabi_dou}
      DEV_CONVERGE_DATA_ROOT: /data/dev_converge
      DEV_CONVERGE_SITE_URL: ${DEV_CONVERGE_SITE_URL:-https://converge.gabidou.top}
      DEV_CONVERGE_ALLOWED_HOSTS: ${DEV_CONVERGE_ALLOWED_HOSTS:-converge.gabidou.top,localhost,127.0.0.1,dev-converge-api}
    working_dir: /opt/app
    command: ["sh", "/opt/container-scripts/dev-converge-api-prod.sh"]
    volumes:
      - ${GABI_HOST_DATA_ROOT:-/mnt/HC_Volume_105154890}/dev_converge:/data/dev_converge
    ports:
      - "8011:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/live', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - edge
      - internal

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: gabi-kimi-frontend
    container_name: gabi-kimi-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      FRONTEND_INTERNAL_PORT: 8080
      VITE_API_PROXY_TARGET: http://backend:8000
    working_dir: /opt/frontend
    command: ["sh", "/opt/container-scripts/frontend-prod.sh"]
    volumes:
      - frontend_dist:/opt/frontend/dist
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    networks:
      - edge
      - internal

  qwen-embed:
    build:
      context: .
      dockerfile: Dockerfile.qwen-embed
    image: gabi-kimi-qwen-embed
    container_name: gabi-kimi-qwen-embed
    restart: unless-stopped
    environment:
      HF_HOME: /app/hf_cache
      QWEN_MODEL_ID: Qwen/Qwen3-Embedding-0.6B
      QWEN_SERVED_MODEL_NAME: qwen3-embedding
      QWEN_PORT: "8900"
    volumes:
      - ${GABI_HOST_DATA_ROOT:-/mnt/HC_Volume_105154890}/qwen_models:/app/hf_cache
    expose:
      - "8900"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8900/health >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s
    networks:
      - edge
      - internal
    profiles:
      - embedding

  reranker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: gabi-kimi-backend
    container_name: gabi-kimi-reranker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /opt/app
      RERANKER_BIND_HOST: ${RERANKER_BIND_HOST:-0.0.0.0}
      RERANKER_PORT: ${RERANKER_PORT:-8902}
      RERANKER_MODEL: ${RERANKER_MODEL:-ai/qwen3-reranker-vllm:0.6B}
      RERANKER_UPSTREAM_URL: ${RERANKER_UPSTREAM_URL:-http://host.docker.internal:8080/engines/vllm/rerank}
      RERANKER_UPSTREAM_TIMEOUT: ${RERANKER_UPSTREAM_TIMEOUT:-1.5}
      RERANKER_MAX_DOCS: ${RERANKER_MAX_DOCS:-50}
      RERANKER_MAX_DOC_CHARS: ${RERANKER_MAX_DOC_CHARS:-2200}
      RERANKER_MAX_CONCURRENCY: ${RERANKER_MAX_CONCURRENCY:-2}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /opt/app
    command: ["python", "/opt/app/ops/reranker_adapter.py"]
    ports:
      - "8902:8902"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8902/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - edge
      - internal
    profiles:
      - reranker

  nginx:
    image: nginx:1.27-alpine
    container_name: gabi-kimi-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      dev-converge-api:
        condition: service_healthy
    volumes:
      - ./ops/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - edge
      - internal
    profiles:
      - container-nginx

volumes:
  frontend_dist:

networks:
  edge:
  internal:
    internal: true
