# =============================================================================
# GABI MCP Hybrid Search Server - Docker Compose
# =============================================================================
#
# This compose file adds the MCP Hybrid Search Server to the GABI stack.
# It provides:
# - search_exact: Exact search by specific fields
# - search_semantic: Semantic/meaning-based search
# - search_hybrid: Combined exact + semantic with RRF
# - SSE transport for ChatTCU integration
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker/docker-compose.mcp-hybrid.yml up
#
# Or include in main docker-compose.override.yml
# =============================================================================

version: "3.8"

services:
  # ===========================================================================
  # MCP Hybrid Search Server
  # ===========================================================================
  mcp-hybrid:
    build:
      context: ..
      dockerfile: docker/mcp-hybrid.Dockerfile
    container_name: gabi-mcp-hybrid
    hostname: mcp-hybrid
    
    ports:
      - "${GABI_MCP_PORT:-8001}:8001"
    
    environment:
      # Environment
      - GABI_ENVIRONMENT=${GABI_ENVIRONMENT:-production}
      - GABI_LOG_LEVEL=${GABI_LOG_LEVEL:-info}
      
      # Database
      - GABI_DATABASE_URL=${GABI_DATABASE_URL:-postgresql+asyncpg://gabi:gabi@postgres:5432/gabi}
      
      # Elasticsearch
      - GABI_ELASTICSEARCH_URL=${GABI_ELASTICSEARCH_URL:-http://elasticsearch:9200}
      - GABI_ELASTICSEARCH_INDEX=${GABI_ELASTICSEARCH_INDEX:-gabi_documents_v1}
      
      # Redis (for rate limiting and caching)
      - GABI_REDIS_URL=${GABI_REDIS_URL:-redis://redis:6379/0}
      
      # Embeddings Service (TEI)
      - GABI_EMBEDDINGS_URL=${GABI_EMBEDDINGS_URL:-http://embeddings:8080}
      - GABI_EMBEDDINGS_MODEL=${GABI_EMBEDDINGS_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      - GABI_EMBEDDINGS_DIMENSIONS=384
      
      # MCP Settings
      - GABI_MCP_ENABLED=true
      - GABI_MCP_PORT=8001
      - GABI_MCP_AUTH_REQUIRED=${GABI_MCP_AUTH_REQUIRED:-true}
      - GABI_MCP_CORS_ORIGINS=${GABI_MCP_CORS_ORIGINS:-http://localhost:3000,https://chattcu.tcu.gov.br}
      
      # Auth (Keycloak)
      - GABI_JWT_ISSUER=${GABI_JWT_ISSUER:-https://auth.tcu.gov.br/realms/tcu}
      - GABI_JWT_AUDIENCE=${GABI_JWT_AUDIENCE:-gabi-api}
      - GABI_JWT_JWKS_URL=${GABI_JWT_JWKS_URL:-https://auth.tcu.gov.br/realms/tcu/protocol/openid-connect/certs}
      
      # Rate Limiting
      - GABI_RATE_LIMIT_ENABLED=${GABI_RATE_LIMIT_ENABLED:-true}
      - GABI_RATE_LIMIT_REQUESTS_PER_MINUTE=${GABI_RATE_LIMIT_REQUESTS_PER_MINUTE:-60}
      - GABI_RATE_LIMIT_BURST=${GABI_RATE_LIMIT_BURST:-10}
      
      # Search Settings
      - GABI_SEARCH_RRF_K=${GABI_SEARCH_RRF_K:-60}
      - GABI_SEARCH_DEFAULT_LIMIT=${GABI_SEARCH_DEFAULT_LIMIT:-10}
      - GABI_SEARCH_MAX_LIMIT=${GABI_SEARCH_MAX_LIMIT:-100}
      - GABI_SEARCH_BM25_WEIGHT=${GABI_SEARCH_BM25_WEIGHT:-1.0}
      - GABI_SEARCH_VECTOR_WEIGHT=${GABI_SEARCH_VECTOR_WEIGHT:-1.0}
      - GABI_SEARCH_TIMEOUT_MS=${GABI_SEARCH_TIMEOUT_MS:-5000}
    
    volumes:
      # Mount sources.yaml for configuration
      - ../sources.yaml:/app/sources.yaml:ro
      # Logs
      - mcp_logs:/app/logs
    
    networks:
      - gabi-network
    
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      embeddings:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mcp-hybrid.rule=Host(`mcp.gabi.local`)"
      - "traefik.http.routers.mcp-hybrid.entrypoints=web"
      - "traefik.http.services.mcp-hybrid.loadbalancer.server.port=8001"
      - "traefik.http.middlewares.mcp-hybrid-ratelimit.ratelimit.average=60"
      - "traefik.http.middlewares.mcp-hybrid-ratelimit.ratelimit.burst=10"

  # ===========================================================================
  # Optional: MCP Load Balancer (for high availability)
  # ===========================================================================
  mcp-hybrid-lb:
    image: nginx:alpine
    container_name: gabi-mcp-hybrid-lb
    profiles:
      - ha  # Only start with --profile ha
    
    ports:
      - "8002:80"
    
    volumes:
      - ./nginx/mcp-nginx.conf:/etc/nginx/nginx.conf:ro
    
    networks:
      - gabi-network
    
    depends_on:
      - mcp-hybrid
    
    restart: unless-stopped

# =============================================================================
# Volumes
# =============================================================================
volumes:
  mcp_logs:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  gabi-network:
    external: true
    name: gabi-network
