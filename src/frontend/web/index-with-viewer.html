<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GABI • DOU Search</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  
  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
  
  <style>
    :root {
      --bg: #0d111b;
      --bg-soft: #151d2c;
      --card: #0f1726cc;
      --line: #ffffff1e;
      --text: #ecf2ff;
      --muted: #a7b4cf;
      --accent: #00d0c8;
      --accent-2: #6be4d4;
      --danger: #ff6a7f;
      --radius: 20px;
      --shadow: 0 18px 50px #00000066;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: radial-gradient(1200px 550px at 10% -20%, #22325a 0, #0d111b 48%), linear-gradient(180deg, #0d111b, #090d16); color: var(--text); font-family: Manrope, sans-serif; min-height: 100%; }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 22px 18px 42px; }
    .brand { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 20px; }
    .logo { font-family: Fraunces, serif; font-size: clamp(24px, 3.8vw, 42px); letter-spacing: .2px; }
    .tag { color: var(--muted); font-weight: 600; font-size: 13px; border: 1px solid var(--line); border-radius: 999px; padding: 6px 12px; background: #ffffff08; }
    .hero { background: linear-gradient(140deg, #1b2744dd, #111a2fdd); border: 1px solid #ffffff22; border-radius: 26px; padding: 26px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
    .hero::after { content: ""; position: absolute; width: 330px; height: 330px; border-radius: 50%; background: radial-gradient(circle, #00d0c840, transparent 65%); right: -140px; top: -140px; }
    .hero h1 { margin: 0 0 8px; font-size: clamp(26px, 4vw, 44px); line-height: 1.05; letter-spacing: -0.6px; }
    .hero p { margin: 0 0 16px; color: #d6dff3; max-width: 760px; }
    .searchbox { position: relative; }
    .searchbar { width: 100%; border: 1px solid #ffffff2e; background: #ffffff10; color: var(--text); border-radius: 999px; padding: 15px 126px 15px 22px; font-size: 17px; outline: none; transition: .22s border-color, .22s background; }
    .searchbar:focus { border-color: var(--accent-2); background: #ffffff16; }
    .btn { position: absolute; right: 8px; top: 8px; border: 0; border-radius: 999px; background: linear-gradient(120deg, var(--accent), var(--accent-2)); color: #062c2b; font-weight: 800; padding: 10px 18px; cursor: pointer; }
    .examples { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .chip { border: 1px solid #ffffff2a; background: #ffffff08; color: #e9f0ff; border-radius: 999px; padding: 7px 12px; font-size: 13px; cursor: pointer; }
    .chip:hover { border-color: #ffffff55; }
    .autocomplete { position: absolute; left: 0; right: 0; top: 52px; border: 1px solid #ffffff22; border-radius: 14px; background: #0f1627f7; backdrop-filter: blur(10px); box-shadow: var(--shadow); overflow: hidden; z-index: 10; display: none; }
    .autocomplete.show { display: block; }
    .autocomplete button { width: 100%; text-align: left; border: 0; background: transparent; color: #e8efff; padding: 10px 14px; cursor: pointer; }
    .autocomplete button:hover, .autocomplete button.active { background: #ffffff12; }

    .layout { display: grid; grid-template-columns: 290px 1fr; gap: 16px; margin-top: 16px; }
    .panel { background: var(--card); border: 1px solid #ffffff1f; border-radius: var(--radius); padding: 14px; backdrop-filter: blur(8px); }
    .panel h3 { margin: 3px 0 12px; font-size: 14px; text-transform: uppercase; letter-spacing: .09em; color: #9fb0d2; }
    .field { display: grid; gap: 6px; margin-bottom: 11px; }
    .field label { font-size: 12px; color: #b8c5de; }
    select, input[type="date"] { width: 100%; background: #0f1828; color: #ecf2ff; border: 1px solid #ffffff2b; border-radius: 10px; padding: 10px; }
    .inline { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .results-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 10px; }
    .meta { color: var(--muted); font-size: 13px; }
    .list { display: grid; gap: 10px; }
    .card { border: 1px solid #ffffff22; border-radius: 16px; padding: 14px; background: #ffffff08; cursor: pointer; transition: .2s transform, .2s border-color, .2s background; }
    .card:hover { transform: translateY(-2px); border-color: #ffffff4d; background: #ffffff10; }
    .kicker { font-size: 12px; color: #9fafd0; margin-bottom: 5px; }
    .title { font-weight: 800; margin-bottom: 5px; }
    .snippet { color: #d6e0f8; font-size: 14px; line-height: 1.4; }

    .pager { display: flex; gap: 8px; margin-top: 10px; }
    .pager button { border: 1px solid #ffffff2d; background: #ffffff08; color: #eff4ff; border-radius: 999px; padding: 8px 12px; cursor: pointer; }
    .pager button:disabled { opacity: .45; cursor: not-allowed; }

    @media (max-width: 940px) {
      .layout { grid-template-columns: 1fr; }
      .hero { padding: 20px; }
      .searchbar { padding-right: 102px; }
      .btn { padding: 9px 14px; }
    }

    /* ========================================= */
    /* DOCUMENT VIEWER STYLES                    */
    /* ========================================= */
    
    /* Overlay */
    .document-viewer-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
    }
    
    .dv-overlay {
      position: absolute;
      inset: 0;
      background: rgba(13, 17, 27, 0.85);
      backdrop-filter: blur(4px);
    }
    
    /* Painel */
    .dv-panel {
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(180deg, #0d111b 0%, #090d16 100%);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .dv-panel-desktop {
      width: 60%;
      max-width: 900px;
      min-width: 600px;
      border-left: 1px solid rgba(255, 255, 255, 0.12);
    }
    
    .dv-panel-mobile {
      width: 100%;
      left: 0;
    }
    
    /* Container */
    .dv-container {
      display: flex;
      height: 100%;
      overflow: hidden;
    }
    
    .dv-container.with-toc {
      display: grid;
      grid-template-columns: 220px 1fr;
    }
    
    /* TOC */
    .dv-toc {
      background: rgba(15, 23, 38, 0.8);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      padding: 20px 16px;
      overflow-y: auto;
    }
    
    .dv-toc-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9fb0d2;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .dv-toc-nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .dv-toc-link {
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.4;
      color: #b8c5de;
      text-decoration: none;
      transition: all 0.2s;
      border-left: 2px solid transparent;
    }
    
    .dv-toc-link:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #ecf2ff;
    }
    
    .dv-toc-link.active {
      background: rgba(0, 208, 200, 0.1);
      color: #00d0c8;
      border-left-color: #00d0c8;
    }
    
    .dv-toc-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      margin-top: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #b8c5de;
      font-size: 13px;
      cursor: pointer;
    }
    
    .dv-toc-mobile {
      margin-top: 12px;
      padding: 12px;
      background: rgba(15, 23, 38, 0.95);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    /* Conteúdo */
    .dv-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px 32px;
    }
    
    /* Header */
    .dv-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: linear-gradient(180deg, #0d111b 0%, rgba(13, 17, 27, 0.95) 100%);
      padding: 16px 0 12px;
      margin: -24px -32px 20px;
      padding-left: 32px;
      padding-right: 32px;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    
    .dv-header-scrolled {
      border-bottom-color: rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    
    .dv-header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    
    .dv-breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    
    .dv-breadcrumb-link {
      background: none;
      border: none;
      color: #00d0c8;
      cursor: pointer;
      font-size: 13px;
      padding: 0;
    }
    
    .dv-breadcrumb-link:hover { text-decoration: underline; }
    
    .dv-breadcrumb-separator {
      width: 16px;
      height: 16px;
      color: #6b7280;
    }
    
    .dv-breadcrumb-current {
      color: #ecf2ff;
      font-weight: 600;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    /* Ações */
    .dv-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .dv-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    
    .dv-btn .dv-icon { width: 16px; height: 16px; }
    
    .dv-btn-ghost {
      background: rgba(255, 255, 255, 0.08);
      color: #b8c5de;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    
    .dv-btn-ghost:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #ecf2ff;
    }
    
    .dv-btn-close {
      background: rgba(255, 106, 127, 0.1);
      color: #ff6a7f;
      border: 1px solid rgba(255, 106, 127, 0.2);
    }
    
    .dv-btn-close:hover { background: rgba(255, 106, 127, 0.2); }
    
    .dv-btn-success {
      background: rgba(0, 208, 200, 0.15) !important;
      color: #00d0c8 !important;
      border-color: rgba(0, 208, 200, 0.3) !important;
    }
    
    .dv-btn-primary {
      background: linear-gradient(120deg, #00d0c8, #6be4d4);
      color: #062c2b;
      font-weight: 600;
    }
    
    .dv-btn-nav {
      background: rgba(255, 255, 255, 0.08);
      color: #b8c5de;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    
    .dv-btn-nav:hover { background: rgba(255, 255, 255, 0.12); color: #ecf2ff; }
    
    /* Contexto */
    .dv-context-box {
      background: linear-gradient(135deg, rgba(0, 208, 200, 0.08), rgba(107, 228, 212, 0.05));
      border: 1px solid rgba(0, 208, 200, 0.15);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 24px;
    }
    
    .dv-context-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #00d0c8;
      margin-bottom: 10px;
    }
    
    .dv-context-text {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: #d6e0f8;
      font-style: italic;
      border-left: 2px solid rgba(0, 208, 200, 0.3);
      padding-left: 14px;
    }
    
    /* Metadata Tags */
    .dv-metadata {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }
    
    .dv-tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid;
    }
    
    .dv-tag-type {
      background: rgba(0, 208, 200, 0.1);
      color: #00d0c8;
      border-color: rgba(0, 208, 200, 0.2);
    }
    
    .dv-tag-date {
      background: rgba(255, 255, 255, 0.06);
      color: #a7b4cf;
      border-color: rgba(255, 255, 255, 0.1);
    }
    
    .dv-tag-do1 {
      background: rgba(59, 130, 246, 0.1);
      color: #60a5fa;
      border-color: rgba(59, 130, 246, 0.2);
    }
    
    .dv-tag-do2 {
      background: rgba(168, 85, 247, 0.1);
      color: #c084fc;
      border-color: rgba(168, 85, 247, 0.2);
    }
    
    .dv-tag-do3 {
      background: rgba(245, 158, 11, 0.1);
      color: #fbbf24;
      border-color: rgba(245, 158, 11, 0.2);
    }
    
    .dv-tag-organ {
      background: rgba(107, 228, 212, 0.08);
      color: #6be4d4;
      border-color: rgba(107, 228, 212, 0.15);
    }
    
    .dv-tag-number {
      background: rgba(255, 255, 255, 0.06);
      color: #ecf2ff;
      border-color: rgba(255, 255, 255, 0.12);
      font-family: 'Fraunces', serif;
    }
    
    /* Corpo do Documento */
    .dv-body {
      font-family: 'Source Serif 4', Georgia, serif;
      line-height: 1.8;
      color: #e2e8f0;
      max-width: 65ch;
    }
    
    .dv-identifica {
      font-family: 'Fraunces', serif;
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 700;
      line-height: 1.3;
      color: #ecf2ff;
      margin: 0 0 20px;
      text-align: center;
    }
    
    .dv-ementa {
      font-style: italic;
      font-size: 16px;
      line-height: 1.7;
      color: #b8c5de;
      text-align: center;
      margin: 0 0 28px;
      padding: 0 20px;
    }
    
    /* Classes DOU */
    .dou-body .identifica {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin: 24px 0 16px;
      color: #ecf2ff;
    }
    
    .dou-body .subtitulo {
      font-family: 'Source Serif 4', serif;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      margin: 20px 0 12px;
      color: #d6e0f8;
    }
    
    .dou-body .ementa {
      font-style: italic;
      font-size: 15px;
      line-height: 1.7;
      color: #a7b4cf;
      text-align: center;
      margin: 0 0 24px;
    }
    
    .dou-body p {
      margin: 0 0 1em;
      text-align: justify;
      text-indent: 2em;
    }
    
    .dou-body p:first-of-type { text-indent: 0; }
    
    /* Assinaturas */
    .dv-signatures {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .dv-signatures-title {
      font-family: Manrope, sans-serif;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9fb0d2;
      margin: 0 0 16px;
    }
    
    .dv-signatures-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .dv-signature { text-align: center; }
    
    .dv-signature-name {
      font-family: 'Source Serif 4', serif;
      font-size: 16px;
      font-weight: 600;
      color: #ecf2ff;
    }
    
    .dv-signature-role {
      font-family: Manrope, sans-serif;
      font-size: 13px;
      color: #a7b4cf;
      margin-top: 2px;
    }
    
    /* Referências Normativas */
    .dv-normative-refs {
      margin-top: 32px;
      padding: 20px;
      background: rgba(15, 23, 38, 0.6);
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .dv-normative-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: Manrope, sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #ecf2ff;
      margin: 0 0 14px;
    }
    
    .dv-normative-title .dv-icon {
      width: 18px;
      height: 18px;
      color: #00d0c8;
    }
    
    .dv-normative-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .dv-normative-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      background: rgba(0, 208, 200, 0.08);
      border: 1px solid rgba(0, 208, 200, 0.2);
      border-radius: 8px;
      color: #00d0c8;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .dv-normative-badge:hover {
      background: rgba(0, 208, 200, 0.15);
      border-color: rgba(0, 208, 200, 0.35);
      transform: translateY(-1px);
    }
    
    .dv-normative-type { font-weight: 600; }
    .dv-normative-number { color: #6be4d4; }
    .dv-normative-date { color: #a7b4cf; }
    
    /* Footer */
    .dv-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .dv-footer-info {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: #6b7280;
    }
    
    .dv-footer-nav { display: flex; gap: 8px; }
    
    /* Skeleton */
    .dv-skeleton {
      padding: 32px;
      animation: dv-skeleton-pulse 2s ease-in-out infinite;
    }
    
    .dv-skeleton-header { margin-bottom: 24px; }
    
    .dv-skeleton-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .dv-skeleton-line {
      height: 16px;
      background: linear-gradient(90deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 100%);
      background-size: 200% 100%;
      border-radius: 4px;
      animation: dv-skeleton-shimmer 1.5s infinite;
    }
    
    .dv-skeleton-line-short { width: 40%; }
    .dv-skeleton-line-medium { width: 60%; }
    
    .dv-skeleton-paragraph {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 16px;
    }
    
    @keyframes dv-skeleton-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    @keyframes dv-skeleton-shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    /* Erro */
    .dv-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 40px;
      text-align: center;
    }
    
    .dv-error-icon {
      width: 48px;
      height: 48px;
      color: #ff6a7f;
      margin-bottom: 16px;
    }
    
    .dv-error h3 {
      margin: 0 0 8px;
      font-size: 18px;
      color: #ecf2ff;
    }
    
    .dv-error p {
      margin: 0 0 20px;
      color: #a7b4cf;
      font-size: 14px;
    }
    
    /* Ícones */
    .dv-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    
    /* Print */
    @media print {
      .dv-overlay, .dv-toc, .dv-actions, .dv-footer-nav, .dv-toc-toggle, .dv-toc-mobile {
        display: none !important;
      }
      
      .document-viewer-overlay {
        position: static;
        display: block !important;
      }
      
      .dv-panel {
        position: static;
        width: 100% !important;
        border: none;
        box-shadow: none;
      }
      
      .dv-container { display: block; }
      
      .dv-content {
        padding: 0;
        overflow: visible;
      }
      
      .dv-header {
        position: static;
        margin: 0 0 20px;
        padding: 0;
      }
      
      .dv-body { max-width: none; }
    }
    
    /* Mobile */
    @media (max-width: 768px) {
      .dv-content { padding: 16px 20px 24px; }
      
      .dv-header {
        margin: -16px -20px 16px;
        padding: 12px 20px;
      }
      
      .dv-header-top {
        flex-direction: column;
        align-items: flex-start;
      }
      
      .dv-breadcrumb-current { max-width: 100%; }
      
      .dv-actions {
        width: 100%;
        justify-content: flex-end;
      }
      
      .dv-metadata { gap: 6px; }
      
      .dv-tag {
        padding: 4px 10px;
        font-size: 11px;
      }
      
      .dv-identifica { font-size: 20px; }
      
      .dv-ementa {
        font-size: 14px;
        padding: 0;
      }
      
      .dou-body p { text-indent: 1.5em; }
      
      .dv-footer {
        flex-direction: column;
        gap: 16px;
        align-items: stretch;
      }
      
      .dv-footer-nav { justify-content: space-between; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="logo">GABI Search</div>
      <div class="tag">DOU • UX Refresh</div>
    </div>

    <section class="hero">
      <h1>Busque no DOU com fluidez.</h1>
      <p>Pesquisa rápida com autocomplete, exemplos reais e leitura completa do documento.</p>
      <div class="searchbox">
        <input id="q" class="searchbar" placeholder='Ex: portarias do ministério da saúde em 2002' autocomplete="off" />
        <button id="go" class="btn">Buscar</button>
        <div id="autocomplete" class="autocomplete"></div>
      </div>
      <div id="examples" class="examples"></div>
    </section>

    <section class="layout">
      <aside class="panel">
        <h3>Filtros</h3>
        <div class="field">
          <label>Seção</label>
          <select id="section">
            <option value="">Todas</option>
            <option value="do1">DO1 — Normativos</option>
            <option value="do2">DO2 — Pessoal</option>
            <option value="do3">DO3 — Licitações</option>
          </select>
        </div>
        <div class="field">
          <label>Tipo de ato</label>
          <select id="type"><option value="">Todos</option></select>
        </div>
        <div class="field">
          <label>Período</label>
          <div class="inline">
            <input id="dfrom" type="date" />
            <input id="dto" type="date" />
          </div>
        </div>
        <div class="field">
          <label>Ordenar (local)</label>
          <select id="sortLocal">
            <option value="relevance">Relevância</option>
            <option value="date_desc">Data (mais recente)</option>
            <option value="date_asc">Data (mais antiga)</option>
          </select>
        </div>
      </aside>

      <main class="panel">
        <div class="results-head">
          <div id="meta" class="meta">Pronto para buscar.</div>
          <div class="meta" id="backend"></div>
        </div>
        <div id="list" class="list"></div>
        <div class="pager">
          <button id="prev">Anterior</button>
          <button id="next">Próxima</button>
        </div>
      </main>
    </section>
  </div>

  <!-- ========================================= -->
  <!-- DOCUMENT VIEWER ALPINE COMPONENT          -->
  <!-- ========================================= -->
  <div 
    x-data="documentViewer()"
    x-init="init()"
    x-show="isOpen"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    @keydown.escape.window="close()"
    class="document-viewer-overlay"
    style="display: none;"
  >
    <!-- Overlay escuro -->
    <div 
      x-show="isOpen"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0"
      x-transition:enter-end="opacity-60"
      x-transition:leave="transition ease-in duration-200"
      x-transition:leave-start="opacity-60"
      x-transition:leave-end="opacity-0"
      @click="close()"
      class="dv-overlay"
    ></div>

    <!-- Slide-over Panel -->
    <div 
      x-show="isOpen"
      x-transition:enter="transform transition ease-out duration-300"
      x-transition:enter-start="translate-x-full"
      x-transition:enter-end="translate-x-0"
      x-transition:leave="transform transition ease-in duration-200"
      x-transition:leave-start="translate-x-0"
      x-transition:leave-end="translate-x-full"
      :class="{ 'dv-panel-mobile': isMobile, 'dv-panel-desktop': !isMobile }"
      class="dv-panel"
      @click.stop
    >
      <!-- Estado de Loading (Skeleton) -->
      <template x-if="loading">
        <div class="dv-skeleton">
          <div class="dv-skeleton-header">
            <div class="dv-skeleton-line dv-skeleton-line-short"></div>
            <div class="dv-skeleton-line dv-skeleton-line-medium"></div>
          </div>
          <div class="dv-skeleton-body">
            <div class="dv-skeleton-line"></div>
            <div class="dv-skeleton-line"></div>
            <div class="dv-skeleton-line dv-skeleton-line-short"></div>
            <div class="dv-skeleton-paragraph">
              <div class="dv-skeleton-line"></div>
              <div class="dv-skeleton-line"></div>
              <div class="dv-skeleton-line"></div>
            </div>
          </div>
        </div>
      </template>

      <!-- Conteúdo do Documento -->
      <template x-if="!loading && document">
        <div class="dv-container" :class="{ 'with-toc': showToc && !isMobile }">
          
          <!-- TOC Lateral (Desktop) -->
          <aside 
            x-show="showToc && !isMobile" 
            class="dv-toc"
            x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0 -translate-x-4"
            x-transition:enter-end="opacity-100 translate-x-0"
          >
            <div class="dv-toc-header">

              <template x-for="(item, index) in tocItems" :key="index">

                  :href="'#section-' + index"
                  @click.prevent="scrollToSection(index)"
                  :class="{ 'active': activeSection === index }"
                  class="dv-toc-link"
                  x-text="item"

              </template>
            </nav>
          </aside>

          <!-- Conteúdo Principal -->
          <div class="dv-content">
            
            <!-- Header Sticky -->

                <!-- Botões de Ação -->

                  >
                    <svg class="dv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <template x-if="!linkCopied">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                      </template>
                      <template x-if="linkCopied">
                        <polyline points="20 6 9 17 4 12"/>
                      </template>
                    </svg>
                    <span x-text="linkCopied ? 'Copiado' : 'Copiar link'"></span>
                  </button>

                  <button @click="shareDocument()" class="dv-btn dv-btn-ghost" title="Compartilhar">
                    <svg class="dv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <circle cx="18" cy="5" r="3"/>

                      <circle cx="18" cy="19" r="3"/>
                      <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                      <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                    </svg>
                    <span>Compartilhar</span>
                  </button>

                  <button @click="close()" class="dv-btn dv-btn-close" title="Fechar (ESC)">
                    <svg class="dv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <line x1="18" y1="6" x2="6" y2="18"/>
                      <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                    <span>Fechar</span>
                  </button>
                </div>
              </div>

              <!-- TOC Toggle (Mobile) -->
              <button 
                x-show="isMobile && tocItems.length > 0"
                @click="showToc = !showToc"
                class="dv-toc-toggle"
              >
                <svg class="dv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 6h16M4 12h16M4 18h7"/>
                </svg>
                <span x-text="showToc ? 'Ocultar sumário' : 'Mostrar sumário'"></span>
              </button>

              <!-- TOC Dropdown (Mobile) -->
              <div 
                x-show="isMobile && showToc"
                x-collapse
                class="dv-toc-mobile"
              >
                <template x-for="(item, index) in tocItems" :key="index">
                  <a 
                    :href="'#section-' + index"
                    @click.prevent="scrollToSection(index); showToc = false"
                    class="dv-toc-link"
                    x-text="item"
                  ></a>
                </template>
              </div>
            </header>

            <!-- Citação Inline (quando vem do chat) -->
            <div x-show="context" class="dv-context-box" x-transition>
              <div class="dv-context-label">
                <svg class="dv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
                <span>Contexto da conversa</span>
              </div>
              <blockquote class="dv-context-text" x-text="context"></blockquote>
            </div>

            <!-- Metadata Tags -->
            <div class="dv-metadata">
              <span class="dv-tag dv-tag-type" x-text="document.art_type || 'Documento'"></span>
              <span class="dv-tag dv-tag-date" x-text="formatDate(document.publication_date)"></span>
              <span class="dv-tag" :class="'dv-tag-' + document.section" x-text="formatSection(document.section)"></span>
              <span class="dv-tag dv-tag-organ" x-text="document.issuing_organ || 'Órgão não informado'"></span>
              <template x-if="document.document_number">
                <span class="dv-tag dv-tag-number" x-text="'Nº ' + document.document_number + '/' + (document.document_year || '')"></span>
              </template>
            </div>

            <!-- Corpo do Documento -->
            <article class="dv-body" x-ref="bodyContent">

                x-show="document.identifica"

              ></h1>

              <div 
                x-show="document.ementa" 
                class="dv-ementa"
                x-html="document.ementa"
              ></div>

              <div 
                class="dou-body"
                x-html="document.body_html || formatBodyPlain(document.body_plain)"

              ></div>

              <div x-show="document.signatures && document.signatures.length > 0" class="dv-signatures">
                <h3 class="dv-signatures-title">Assinaturas</h3>

                  <template x-for="(sig, index) in document.signatures" :key="index">
                    <div class="dv-signature">
                      <div class="dv-signature-name" x-text="sig.person_name"></div>
                      <div class="dv-signature-role" x-text="sig.role_title"></div>
                    </div>

                </div>

            <!-- Referências Normativas -->
            <div 
              x-show="document.normative_refs && document.normative_refs.length > 0"

            >
              <h3 class="dv-normative-title">
                <svg class="dv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                  <line x1="16" y1="13" x2="8" y2="13"/>
                  <line x1="16" y1="17" x2="8" y2="17"/>
                  <polyline points="10 9 9 9 8 9"/>
                </svg>
                Referências Normativas
              </h3>

                <template x-for="(ref, index) in document.normative_refs" :key="index">
                  <button 
                    @click="searchNormativeRef(ref)"
                    class="dv-normative-badge"
                    :title="'Buscar ' + ref.reference_type + ' ' + ref.reference_number"
                  >
                    <span class="dv-normative-type" x-text="ref.reference_type"></span>

                    <span x-show="ref.reference_date" class="dv-normative-date" x-text="'/' + ref.reference_date"></span>

            <!-- Footer -->
            <footer class="dv-footer">
              <div class="dv-footer-info">

                  x-show="hasPrevDoc"

                >

                    <polyline points="15 18 9 12 15 6"/>

      <!-- Estado de Erro -->
      <template x-if="error">
        <div class="dv-error">

            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <h3>Erro ao carregar documento</h3>
          <p x-text="error"></p>
          <button @click="retry()" class="dv-btn dv-btn-primary">Tentar novamente</button>
        </div>
      </template>

  <script>
    // ==========================================
    // ALPINE.JS DOCUMENT VIEWER COMPONENT
    // ==========================================
    function documentViewer() {
      return {
        // Estado
        isOpen: false,
        loading: false,
        error: null,
        document: null,
        context: null,
        currentDocId: null,
        
        // Configuração
        isMobile: false,
        isScrolled: false,
        showToc: true,
        linkCopied: false,
        activeSection: 0,
        
        // Navegação
        docList: [],
        currentIndex: -1,
        
        // TOC
        tocItems: [],
        
        init() {
          this.checkMobile();
          window.addEventListener('resize', () => this.checkMobile());
          window.addEventListener('keydown', (e) => this.handleKeyboard(e));
          
          this.$nextTick(() => {
            const content = this.$refs.bodyContent;
            if (content) {
              content.addEventListener('scroll', () => {
                this.isScrolled = content.scrollTop > 50;
                this.updateActiveSection();
              });
            }
          });
        },
        
        checkMobile() {
          this.isMobile = window.innerWidth < 768;
          if (this.isMobile) this.showToc = false;
        },
        
        async open(docId, context = null) {
          this.isOpen = true;
          this.currentDocId = docId;
          this.context = context;
          this.loading = true;
          this.error = null;
          this.linkCopied = false;
          
          document.body.style.overflow = 'hidden';
          
          try {
            const response = await fetch(`/api/document/${docId}`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            this.document = await response.json();
            
            this.extractToc();
            this.addToDocList(docId);
            
            this.$nextTick(() => {
              const content = this.$refs.bodyContent;
              if (content) content.scrollTop = 0;
            });
            
          } catch (err) {
            this.error = err.message;
            console.error('Document Viewer Error:', err);
          } finally {
            this.loading = false;
          }
        },
        
        close() {
          this.isOpen = false;
          this.document = null;
          this.error = null;
          this.tocItems = [];
          document.body.style.overflow = '';
          
          window.dispatchEvent(new CustomEvent('documentViewer.closed'));
        },
        
        async retry() {
          if (this.currentDocId) {
            await this.open(this.currentDocId, this.context);
          }
        },
        
        extractToc() {
          this.tocItems = [];
          if (!this.document?.body_html) return;
          
          const parser = new DOMParser();
          const doc = parser.parseFromString(this.document.body_html, 'text/html');
          
          const identifica = doc.querySelector('.identifica');
          if (identifica) this.tocItems.push(this.truncateText(identifica.textContent, 60));
          
          const subtitulos = doc.querySelectorAll('.subtitulo');
          subtitulos.forEach(sub => {
            this.tocItems.push(this.truncateText(sub.textContent, 50));
          });
        },
        
        scrollToSection(index) {
          this.activeSection = index;
          const content = this.$refs.bodyContent;
          if (!content) return;
          
          const elements = content.querySelectorAll('.identifica, .subtitulo');
          if (elements[index]) {
            elements[index].scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        },
        
        updateActiveSection() {
          const content = this.$refs.bodyContent;
          if (!content) return;
          
          const elements = content.querySelectorAll('.identifica, .subtitulo');
          let current = 0;
          
          elements.forEach((el, index) => {
            const rect = el.getBoundingClientRect();
            if (rect.top < 200) current = index;
          });
          
          this.activeSection = current;
        },
        
        async copyLink() {
          const url = `${window.location.origin}/document/${this.currentDocId}`;
          try {
            await navigator.clipboard.writeText(url);
            this.linkCopied = true;
            setTimeout(() => this.linkCopied = false, 2000);
          } catch (err) {
            const input = document.createElement('input');
            input.value = url;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            this.linkCopied = true;
            setTimeout(() => this.linkCopied = false, 2000);
          }
        },
        
        async shareDocument() {
          const shareData = {
            title: this.document?.identifica || 'Documento DOU',
            text: this.document?.ementa || this.document?.body_plain?.substring(0, 200),
            url: `${window.location.origin}/document/${this.currentDocId}`
          };
          
          if (navigator.share) {
            try {
              await navigator.share(shareData);
            } catch (err) {}
          } else {
            this.copyLink();
          }
        },
        
        searchNormativeRef(ref) {
          const query = `${ref.reference_type} ${ref.reference_number}`;
          window.dispatchEvent(new CustomEvent('documentViewer.search', { 
            detail: { query } 
          }));
          this.close();
        },
        
        handleBodyClick(e) {
          const target = e.target.closest('a');
          if (target && target.href) {
            if (target.href.includes('/document/')) {
              e.preventDefault();
              const docId = target.href.split('/document/')[1];
              this.open(docId);
            }
          }
        },
        
        navigateToPrev() {
          if (this.currentIndex > 0) {
            this.currentIndex--;
            this.open(this.docList[this.currentIndex]);
          }
        },
        
        navigateToNext() {
          if (this.currentIndex < this.docList.length - 1) {
            this.currentIndex++;
            this.open(this.docList[this.currentIndex]);
          }
        },
        
        addToDocList(docId) {
          const index = this.docList.indexOf(docId);
          if (index === -1) {
            this.docList.push(docId);
            this.currentIndex = this.docList.length - 1;
          } else {
            this.currentIndex = index;
          }
        },
        
        handleKeyboard(e) {
          if (!this.isOpen) return;
          
          if (e.key === 'ArrowLeft' && this.hasPrevDoc) {
            e.preventDefault();
            this.navigateToPrev();
          } else if (e.key === 'ArrowRight' && this.hasNextDoc) {
            e.preventDefault();
            this.navigateToNext();
          }
        },
        
        formatDate(dateStr) {
          if (!dateStr) return '';
          const date = new Date(dateStr);
          return date.toLocaleDateString('pt-BR', {
            day: '2-digit',
            month: 'long',
            year: 'numeric'
          });
        },
        
        formatSection(section) {
          const map = { do1: 'DO1', do2: 'DO2', do3: 'DO3' };
          return map[section] || section?.toUpperCase() || '';
        },
        
        formatBodyPlain(text) {
          if (!text) return '<p>Conteúdo não disponível</p>';
          return `<p>${text.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>')}</p>`;
        },
        
        truncateText(text, maxLength) {
          if (!text) return '';
          return text.length > maxLength ? text.substring(0, maxLength) + '...' : text;
        },
        
        get hasPrevDoc() {
          return this.currentIndex > 0;
        },
        
        get hasNextDoc() {
          return this.currentIndex < this.docList.length - 1 && this.currentIndex !== -1;
        }
      };
    }

    // ==========================================
    // SEARCH APP (searchUXEngineer)
    // ==========================================
    const state = {
      page: 1,
      q: "*",
      hasMore: false,
      items: [],
      acItems: [],
      acIndex: -1
    };
    const $ = (id) => document.getElementById(id);

    async function api(path) {
      const res = await fetch(path);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function escapeHtml(s = "") {
      return s.replace(/[&<>\"]/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
    }

    function renderExamples(terms) {
      $("examples").innerHTML = "";
      terms.slice(0, 10).forEach((t) => {
        const b = document.createElement("button");
        b.className = "chip";
        b.textContent = t;
        b.onclick = () => { $("q").value = t; search(1); };
        $("examples").appendChild(b);
      });
    }

    function getResultsArray(data) {
      return Array.isArray(data.results) ? data.results : (Array.isArray(data.hits) ? data.hits : []);
    }

    function sortLocal(items) {
      const mode = $("sortLocal").value;
      if (mode === "relevance") return items;
      const cp = [...items];
      cp.sort((a, b) => {
        const da = new Date(a.pub_date || 0).getTime();
        const db = new Date(b.pub_date || 0).getTime();
        return mode === "date_desc" ? db - da : da - db;
      });
      return cp;
    }

    function renderList(items, query = "") {
      const list = $("list");
      list.innerHTML = "";
      items.forEach((it) => {
        const card = document.createElement("article");
        card.className = "card";
        const docId = it.doc_id || it.id;
        card.innerHTML = `
          <div class="kicker">${escapeHtml((it.pub_date || "") + " • " + (it.edition_section || "").toUpperCase())}</div>
          <div class="title">${escapeHtml(it.identifica || it.titulo || "Sem título")}</div>
          <div class="snippet">${escapeHtml(it.snippet || it.ementa || "Sem prévia")}</div>
        `;
        // INTEGRAÇÃO: Chamar o Alpine.js document viewer
        card.onclick = () => {
          if (docId) {
            // Disparar evento para o Alpine component
            window.dispatchEvent(new CustomEvent('open-document-viewer', {
              detail: { docId }
            }));
          }
        };
        list.appendChild(card);
      });
      if (!items.length) {
        const q = query ? ` para "${escapeHtml(query)}"` : "";
        list.innerHTML = `<div class="meta">Nenhum resultado${q}.</div>`;
      }
    }

    async function search(page = 1) {
      const q = $("q").value.trim() || "*";
      state.q = q; state.page = page;
      const p = new URLSearchParams({ q, page: String(page), max: "20" });
      const section = $("section").value;
      const artType = $("type").value;
      const dfrom = $("dfrom").value;
      const dto = $("dto").value;
      if (section) p.set("section", section);
      if (artType) p.set("art_type", artType);
      if (dfrom) p.set("date_from", dfrom);
      if (dto) p.set("date_to", dto);

      $("meta").textContent = "Buscando...";
      try {
        const data = await api(`/api/search?${p.toString()}`);
        state.hasMore = !!data.has_more;
        state.items = getResultsArray(data);
        const total = data.total ?? state.items.length;
        $("meta").textContent = `${total.toLocaleString("pt-BR")} resultados • página ${data.page || page}`;
        renderList(sortLocal(state.items), q);
        $("prev").disabled = page <= 1;
        $("next").disabled = !state.hasMore;
      } catch (err) {
        state.items = [];
        state.hasMore = false;
        $("meta").textContent = `Erro na busca: ${err.message || err}`;
        renderList([], q);
        $("prev").disabled = true;
        $("next").disabled = true;
      }
    }

    async function loadBootstrap() {
      try {
        const stats = await api('/api/stats');
        $("backend").textContent = `Backend: ${(stats.search_backend || '').toUpperCase()} • ${(stats.total_docs || 0).toLocaleString('pt-BR')} docs`;
      } catch (_) {}

      try {
        const types = await api('/api/types');
        types.slice(0, 60).forEach((t) => {
          const opt = document.createElement('option');
          opt.value = t.type;
          opt.textContent = `${t.type} (${(t.count || 0).toLocaleString('pt-BR')})`;
          $("type").appendChild(opt);
        });
      } catch (_) {}

      let terms = [];
      try {
        const ex = await api('/api/search-examples?n=10');
        terms = (ex.examples || ex.items || ex.terms || []).map((x) => typeof x === 'string' ? x : (x.term || x.query || '')).filter(Boolean);
      } catch (_) {}
      if (!terms.length) {
        try {
          const top = await api('/api/top-searches?n=10&period=week');
          terms = (top.items || top.top || top.terms || []).map((x) => typeof x === 'string' ? x : (x.term || x.query || '')).filter(Boolean);
        } catch (_) {}
      }
      if (!terms.length) terms = [
        'portarias ministério da saúde 2002',
        'pregão eletrônico caixa 2002',
        'decreto agosto 2002',
        'licitação ministério da defesa 2002'
      ];
      renderExamples(terms);
    }

    let acTimer;

    function pickSuggestion(value, runSearch = true) {
      if (!value) return;
      $("q").value = value;
      hideAutocomplete();
      if (runSearch) search(1);
    }

    function renderAutocomplete(items) {
      const box = $("autocomplete");
      box.innerHTML = "";
      state.acItems = items;
      state.acIndex = -1;
      if (!items.length) {
        hideAutocomplete();
        return;
      }
      items.forEach((v, i) => {
        const b = document.createElement("button");
        b.textContent = v;
        b.dataset.index = String(i);
        b.onclick = () => pickSuggestion(v, true);
        box.appendChild(b);
      });
      box.classList.add("show");
    }

    function syncAutocompleteActive() {
      const buttons = $("autocomplete").querySelectorAll("button");
      buttons.forEach((b, i) => {
        if (i === state.acIndex) b.classList.add("active");
        else b.classList.remove("active");
      });
    }
    async function autocomplete() {
      const q = $("q").value.trim();
      if (q.length < 2) return hideAutocomplete();
      clearTimeout(acTimer);
      acTimer = setTimeout(async () => {
        try {
          const s = await api(`/api/autocomplete?q=${encodeURIComponent(q)}&n=8`);
          const arr = (s.items || s.suggestions || []).map((x) => typeof x === 'string' ? x : (x.term || x.query || '')).filter(Boolean).slice(0, 8);
          renderAutocomplete(arr);
        } catch (_) {
          hideAutocomplete();
        }
      }, 170);
    }

    function hideAutocomplete() {
      $("autocomplete").classList.remove("show");
      state.acItems = [];
      state.acIndex = -1;
    }

    $("go").onclick = () => search(1);
    $("q").addEventListener("keydown", (e) => {
      const hasAc = state.acItems.length > 0;
      if (e.key === "ArrowDown" && hasAc) {
        e.preventDefault();
        state.acIndex = (state.acIndex + 1) % state.acItems.length;
        syncAutocompleteActive();
        return;
      }
      if (e.key === "ArrowUp" && hasAc) {
        e.preventDefault();
        state.acIndex = state.acIndex <= 0 ? state.acItems.length - 1 : state.acIndex - 1;
        syncAutocompleteActive();
        return;
      }
      if (e.key === "Tab" && hasAc) {
        e.preventDefault();
        const idx = state.acIndex >= 0 ? state.acIndex : 0;
        pickSuggestion(state.acItems[idx], true);
        return;
      }
      if (e.key === "Enter") {
        e.preventDefault();
        if (hasAc && state.acIndex >= 0) {
          pickSuggestion(state.acItems[state.acIndex], true);
        } else {
          search(1);
        }
        hideAutocomplete();
      }
    });
    $("q").addEventListener('input', autocomplete);
    $("q").addEventListener('blur', () => setTimeout(hideAutocomplete, 120));

    ["section", "type", "dfrom", "dto", "sortLocal"].forEach((id) => {
      $(id).addEventListener('change', () => id === 'sortLocal' ? renderList(sortLocal(state.items)) : search(1));
    });
    $("prev").onclick = () => state.page > 1 && search(state.page - 1);
    $("next").onclick = () => state.hasMore && search(state.page + 1);

    // Escutar busca de referências normativas
    window.addEventListener('documentViewer.search', (e) => {
      const query = e.detail.query;
      $("q").value = query;
      search(1);
    });

    loadBootstrap().then(() => search(1));
  </script>
</body>
</html>
