<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sem conexão | GABI DOU</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Manrope, system-ui, sans-serif;
        background: #0b1020;
        color: #f5f7fb;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(79, 70, 229, 0.18), transparent 45%),
          linear-gradient(180deg, #10162a, #0b1020 72%);
      }
      main {
        width: min(32rem, calc(100vw - 2rem));
        padding: 2rem;
        border-radius: 1.5rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(12, 18, 34, 0.88);
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.25);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.75rem, 4vw, 2.4rem);
      }
      p {
        margin: 0 0 1rem;
        line-height: 1.65;
        color: rgba(245, 247, 251, 0.82);
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 1rem;
        border-radius: 999px;
        color: #ffffff;
        background: #4f46e5;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sem conexão com a rede</h1>
      <p>O GABI DOU não conseguiu atualizar o conteúdo agora. Reabra esta página quando a conexão voltar ou retorne à tela inicial para continuar com o que já estiver em cache.</p>
      <a href="/">Voltar ao início</a>
    </main>
  </body>
 </html>
