<!-- ============================================ -->
<!-- DOCUMENT VIEWER - Alpine.js Component        -->
<!-- Integração com searchApp do SearchUXEngineer -->
<!-- ============================================ -->

<!-- 
  INSTRUÇÕES DE INTEGRAÇÃO:
  
  1. Adicionar no <head> do index.html:
     <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
     <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  
  2. Substituir o viewer existente (linhas 144-148) por este código
  
  3. O componente se comunica com searchApp via eventos customizados:
     - searchApp dispara: documentViewer.open(docId, context?)
     - searchApp escuta: documentViewer.closed (quando fecha)
-->

<!-- Document Viewer Alpine Component -->
<div 
  x-data="documentViewer()"
  x-init="init()"
  x-show="isOpen"
  x-transition:enter="transition ease-out duration-300"
  x-transition:enter-start="opacity-0"
  x-transition:enter-end="opacity-100"
  x-transition:leave="transition ease-in duration-200"
  x-transition:leave-start="opacity-100"
  x-transition:leave-end="opacity-0"
  x-on:keydown.escape.window="close()"
  x-on:open-document-viewer.window="open($event.detail.docId, $event.detail.context)"
  class="document-viewer-overlay"
  style="display: none;"
>
  <!-- Overlay escuro -->
  <div 
    x-show="isOpen"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-60"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-60"
    x-transition:leave-end="opacity-0"
    @click="close()"
    class="dv-overlay"
  ></div>

  <!-- Slide-over Panel -->
  <div 
    x-show="isOpen"
    x-transition:enter="transform transition ease-out duration-300"
    x-transition:enter-start="translate-x-full"
    x-transition:enter-end="translate-x-0"
    x-transition:leave="transform transition ease-in duration-200"
    x-transition:leave-start="translate-x-0"
    x-transition:leave-end="translate-x-full"
    :class="{ 'dv-panel-mobile': isMobile, 'dv-panel-desktop': !isMobile }"
    class="dv-panel"
    @click.stop
  >
    <!-- Estado de Loading (Skeleton) -->
    <template x-if="loading">
      <div class="dv-skeleton">
        <div class="dv-skeleton-header">
          <div class="dv-skeleton-line dv-skeleton-line-short"></div>
          <div class="dv-skeleton-line dv-skeleton-line-medium"></div>
        </div>
        <div class="dv-skeleton-body">
          <div class="dv-skeleton-line"></div>
          <div class="dv-skeleton-line"></div>
          <div class="dv-skeleton-line dv-skeleton-line-short"></div>
          <div class="dv-skeleton-paragraph">
            <div class="dv-skeleton-line"></div>
            <div class="dv-skeleton-line"></div>
            <div class="dv-skeleton-line"></div>
          </div>
        </div>
      </div>
    </template>

    <!-- Conteúdo do Documento -->
    <template x-if="!loading && document">
      <div class="dv-container" :class="{ 'with-toc': showToc && !isMobile }">
        
        <!-- TOC Lateral (Desktop) -->
        <aside 
          x-show="showToc && !isMobile" 
          class="dv-toc"
          x-transition:enter="transition ease-out duration-200"
          x-transition:enter-start="opacity-0 -translate-x-4"
          x-transition:enter-end="opacity-100 translate-x-0"
        >
          <div class="dv-toc-header">
            <svg class="dv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 6h16M4 12h16M4 18h7"/>
            </svg>
            <span>Sumário</span>
          </div>
          <nav class="dv-toc-nav">
            <template x-for="(item, index) in tocItems" :key="index">
              <a 
                :href="'#section-' + index"
                @click.prevent="scrollToSection(index)"
                :class="{ 'active': activeSection === index }"
                class="dv-toc-link"
                x-text="item"
              ></a>
            </template>
          </nav>
        </aside>

        <!-- Conteúdo Principal -->
        <div class="dv-content">
          
          <!-- Header Sticky -->
          <header class="dv-header" :class="{ 'dv-header-scrolled': isScrolled }">
            <div class="dv-header-top">
              <!-- Breadcrumb -->
              <nav class="dv-breadcrumb">
                <button @click="close()" class="dv-breadcrumb-link">Busca</button>
                <svg class="dv-breadcrumb-separator" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="9 18 15 12 9 6"/>
                </svg>
                <span class="dv-breadcrumb-current" x-text="document.identifica || 'Documento'"></span>
              </nav>

              <!-- Botões de Ação -->
              <div class="dv-actions">
                <button 
                  @click="copyLink()" 
                  class="dv-btn dv-btn-ghost"
                  :class="{ 'dv-btn-success': linkCopied }"
                  :title="linkCopied ? 'Link copiado!' : 'Copiar link'"
                >
                  <svg class="dv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <template x-if="!linkCopied">
                      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </template>
                    <template x-if="linkCopied">
                      <polyline points="20 6 9 17 4 12"/>
                    </template>
                  </svg>
                  <span x-text="linkCopied ? 'Copiado' : 'Copiar link'"></span>
                </button>

                <button @click="shareDocument()" class="dv-btn dv-btn-ghost" title="Compartilhar">
                  <svg class="dv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="18" cy="5" r="3"/>
                    <circle cx="6" cy="12" r="3"/>
                    <circle cx="18" cy="19" r="3"/>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                  </svg>
                  <span>Compartilhar</span>
                </button>

                <button @click="close()" class="dv-btn dv-btn-close" title="Fechar (ESC)">
                  <svg class="dv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                  </svg>
                  <span>Fechar</span>
                </button>
              </div>
            </div>

            <!-- TOC Toggle (Mobile) -->
            <button 
              x-show="isMobile && tocItems.length > 0"
              @click="showToc = !showToc"
              class="dv-toc-toggle"
            >
              <svg class="dv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 6h16M4 12h16M4 18h7"/>
              </svg>
              <span x-text="showToc ? 'Ocultar sumário' : 'Mostrar sumário'"></span>
            </button>

            <!-- TOC Dropdown (Mobile) -->
            <div 
              x-show="isMobile && showToc"
              x-collapse
              class="dv-toc-mobile"
            >
              <template x-for="(item, index) in tocItems" :key="index">
                <a 
                  :href="'#section-' + index"
                  @click.prevent="scrollToSection(index); showToc = false"
                  class="dv-toc-link"
                  x-text="item"
                ></a>
              </template>
            </div>
          </header>

          <!-- Citação Inline (quando vem do chat) -->
          <div x-show="context" class="dv-context-box" x-transition>
            <div class="dv-context-label">
              <svg class="dv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
              <span>Contexto da conversa</span>
            </div>
            <blockquote class="dv-context-text" x-text="context"></blockquote>
          </div>

          <!-- Metadata Tags -->
          <div class="dv-metadata">
            <span class="dv-tag dv-tag-type" x-text="document.art_type || 'Documento'"></span>
            <span class="dv-tag dv-tag-date" x-text="formatDate(document.publication_date)"></span>
            <span class="dv-tag" :class="'dv-tag-' + document.section" x-text="formatSection(document.section)"></span>
            <span class="dv-tag dv-tag-organ" x-text="document.issuing_organ || 'Órgão não informado'"></span>
            <template x-if="document.document_number">
              <span class="dv-tag dv-tag-number" x-text="'Nº ' + document.document_number + '/' + (document.document_year || '')"></span>
            </template>
          </div>

          <!-- Corpo do Documento -->
          <article class="dv-body" x-ref="bodyContent">
            <!-- Identificação -->
            <h1 
              x-show="document.identifica" 
              class="dv-identifica"
              x-text="document.identifica"
            ></h1>

            <!-- Ementa -->
            <div 
              x-show="document.ementa" 
              class="dv-ementa"
              x-html="document.ementa"
            ></div>

            <!-- Corpo HTML -->
            <div 
              class="dou-body"
              x-html="document.body_html || formatBodyPlain(document.body_plain)"
              @click="handleBodyClick($event)"
            ></div>

            <!-- Assinaturas -->
            <div x-show="document.signatures && document.signatures.length > 0" class="dv-signatures">
              <h3 class="dv-signatures-title">Assinaturas</h3>
              <div class="dv-signatures-list">
                <template x-for="(sig, index) in document.signatures" :key="index">
                  <div class="dv-signature">
                    <div class="dv-signature-name" x-text="sig.person_name"></div>
                    <div class="dv-signature-role" x-text="sig.role_title"></div>
                  </div>
                </template>
              </div>
            </div>
          </article>

          <!-- Referências Normativas -->
          <div 
            x-show="document.normative_refs && document.normative_refs.length > 0"
            class="dv-normative-refs"
          >
            <h3 class="dv-normative-title">
              <svg class="dv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
              </svg>
              Referências Normativas
            </h3>
            <div class="dv-normative-list">
              <template x-for="(ref, index) in document.normative_refs" :key="index">
                <button 
                  @click="searchNormativeRef(ref)"
                  class="dv-normative-badge"
                  :title="'Buscar ' + ref.reference_type + ' ' + ref.reference_number"
                >
                  <span class="dv-normative-type" x-text="ref.reference_type"></span>
                  <span class="dv-normative-number" x-text="ref.reference_number"></span>
                  <span x-show="ref.reference_date" class="dv-normative-date" x-text="'/' + ref.reference_date"></span>
                </button>
              </template>
            </div>
          </div>

          <!-- Footer com navegação -->
          <footer class="dv-footer">
            <div class="dv-footer-info">
              <span x-text="document.body_word_count ? document.body_word_count + ' palavras' : ''"></span>
              <span x-show="document.id" x-text="'ID: ' + document.id.substring(0, 8) + '...'"></span>
            </div>
            <div class="dv-footer-nav">
              <button 
                x-show="hasPrevDoc"
                @click="navigateToPrev()"
                class="dv-btn dv-btn-nav"
                title="Documento anterior (←)"
              >
                <svg class="dv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="15 18 9 12 15 6"/>
                </svg>
                <span>Anterior</span>
              </button>
              <button 
                x-show="hasNextDoc"
                @click="navigateToNext()"
                class="dv-btn dv-btn-nav"
                title="Próximo documento (→)"
              >
                <span>Próximo</span>
                <svg class="dv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="9 18 15 12 9 6"/>
                </svg>
              </button>
            </div>
          </footer>
        </div>
      </div>
    </template>

    <!-- Estado de Erro -->
    <template x-if="error">
      <div class="dv-error">
        <svg class="dv-error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <h3>Erro ao carregar documento</h3>
        <p x-text="error"></p>
        <button @click="retry()" class="dv-btn dv-btn-primary">Tentar novamente</button>
      </div>
    </template>
  </div>
</div>

<!-- ============================================ -->
<!-- ALPINE.JS DATA COMPONENT                     -->
<!-- ============================================ -->
<script>
function documentViewer() {
  return {
    // Estado
    isOpen: false,
    loading: false,
    error: null,
    document: null,
    context: null,
    currentDocId: null,
    
    // Configuração
    isMobile: false,
    isScrolled: false,
    showToc: true,
    linkCopied: false,
    activeSection: 0,
    
    // Navegação
    docList: [],
    currentIndex: -1,
    
    // TOC
    tocItems: [],
    
    init() {
      this.checkMobile();
      window.addEventListener('resize', () => this.checkMobile());
      
      // Navegação por teclado
      window.addEventListener('keydown', (e) => this.handleKeyboard(e));
      
      // Scroll handler para header sticky
      this.$nextTick(() => {
        const content = this.$refs.bodyContent;
        if (content) {
          content.addEventListener('scroll', () => {
            this.isScrolled = content.scrollTop > 50;
            this.updateActiveSection();
          });
        }
      });
    },
    
    checkMobile() {
      this.isMobile = window.innerWidth < 768;
      if (this.isMobile) this.showToc = false;
    },
    
    // Abrir visualizador
    async open(docId, context = null) {
      this.isOpen = true;
      this.currentDocId = docId;
      this.context = context;
      this.loading = true;
      this.error = null;
      this.linkCopied = false;
      
      // Prevenir scroll do body
      document.body.style.overflow = 'hidden';
      
      try {
        const response = await fetch(`/api/document/${docId}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        this.document = await response.json();
        
        // Extrair TOC do body_html
        this.extractToc();
        
        // Registrar na lista de documentos vistos
        this.addToDocList(docId);
        
        // Scroll to top
        this.$nextTick(() => {
          const content = this.$refs.bodyContent;
          if (content) content.scrollTop = 0;
        });
        
      } catch (err) {
        this.error = err.message;
        console.error('Document Viewer Error:', err);
      } finally {
        this.loading = false;
      }
    },
    
    // Fechar visualizador
    close() {
      this.isOpen = false;
      this.document = null;
      this.error = null;
      this.tocItems = [];
      document.body.style.overflow = '';
      
      // Notificar searchApp
      window.dispatchEvent(new CustomEvent('documentViewer.closed'));
    },
    
    // Retry loading
    async retry() {
      if (this.currentDocId) {
        await this.open(this.currentDocId, this.context);
      }
    },
    
    // Extrair TOC do body_html
    extractToc() {
      this.tocItems = [];
      if (!this.document?.body_html) return;
      
      // Criar parser temporário
      const parser = new DOMParser();
      const doc = parser.parseFromString(this.document.body_html, 'text/html');
      
      // Buscar .identifica e .subtitulo
      const identifica = doc.querySelector('.identifica');
      if (identifica) this.tocItems.push(this.truncateText(identifica.textContent, 60));
      
      const subtitulos = doc.querySelectorAll('.subtitulo');
      subtitulos.forEach(sub => {
        this.tocItems.push(this.truncateText(sub.textContent, 50));
      });
    },
    
    // Scroll para seção
    scrollToSection(index) {
      this.activeSection = index;
      const content = this.$refs.bodyContent;
      if (!content) return;
      
      // Procurar elemento no DOM renderizado
      const elements = content.querySelectorAll('.identifica, .subtitulo');
      if (elements[index]) {
        elements[index].scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    },
    
    updateActiveSection() {
      const content = this.$refs.bodyContent;
      if (!content) return;
      
      const elements = content.querySelectorAll('.identifica, .subtitulo');
      let current = 0;
      
      elements.forEach((el, index) => {
        const rect = el.getBoundingClientRect();
        if (rect.top < 200) current = index;
      });
      
      this.activeSection = current;
    },
    
    // Copiar link
    async copyLink() {
      const url = `${window.location.origin}/document/${this.currentDocId}`;
      try {
        await navigator.clipboard.writeText(url);
        this.linkCopied = true;
        setTimeout(() => this.linkCopied = false, 2000);
      } catch (err) {
        // Fallback
        const input = document.createElement('input');
        input.value = url;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        this.linkCopied = true;
        setTimeout(() => this.linkCopied = false, 2000);
      }
    },
    
    // Compartilhar
    async shareDocument() {
      const shareData = {
        title: this.document?.identifica || 'Documento DOU',
        text: this.document?.ementa || this.document?.body_plain?.substring(0, 200),
        url: `${window.location.origin}/document/${this.currentDocId}`
      };
      
      if (navigator.share) {
        try {
          await navigator.share(shareData);
        } catch (err) {
          // Usuário cancelou
        }
      } else {
        this.copyLink();
      }
    },
    
    // Buscar referência normativa
    searchNormativeRef(ref) {
      const query = `${ref.reference_type} ${ref.reference_number}`;
      window.dispatchEvent(new CustomEvent('documentViewer.search', { 
        detail: { query } 
      }));
      this.close();
    },
    
    // Handle click no corpo do documento (norm refs internas)
    handleBodyClick(e) {
      const target = e.target.closest('a');
      if (target && target.href) {
        // Se é link interno para norma
        if (target.href.includes('/document/')) {
          e.preventDefault();
          const docId = target.href.split('/document/')[1];
          this.open(docId);
        }
      }
    },
    
    // Navegação entre documentos
    navigateToPrev() {
      if (this.currentIndex > 0) {
        this.currentIndex--;
        this.open(this.docList[this.currentIndex]);
      }
    },
    
    navigateToNext() {
      if (this.currentIndex < this.docList.length - 1) {
        this.currentIndex++;
        this.open(this.docList[this.currentIndex]);
      }
    },
    
    addToDocList(docId) {
      // Adicionar à lista de navegação
      const index = this.docList.indexOf(docId);
      if (index === -1) {
        this.docList.push(docId);
        this.currentIndex = this.docList.length - 1;
      } else {
        this.currentIndex = index;
      }
    },
    
    // Keyboard navigation
    handleKeyboard(e) {
      if (!this.isOpen) return;
      
      if (e.key === 'ArrowLeft' && this.hasPrevDoc) {
        e.preventDefault();
        this.navigateToPrev();
      } else if (e.key === 'ArrowRight' && this.hasNextDoc) {
        e.preventDefault();
        this.navigateToNext();
      }
    },
    
    // Helpers
    formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      return date.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
    },
    
    formatSection(section) {
      const map = { do1: 'DO1', do2: 'DO2', do3: 'DO3' };
      return map[section] || section?.toUpperCase() || '';
    },
    
    formatBodyPlain(text) {
      if (!text) return '<p>Conteúdo não disponível</p>';
      return `<p>${text.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>')}</p>`;
    },
    
    truncateText(text, maxLength) {
      if (!text) return '';
      return text.length > maxLength ? text.substring(0, maxLength) + '...' : text;
    },
    
    // Computed
    get hasPrevDoc() {
      return this.currentIndex > 0;
    },
    
    get hasNextDoc() {
      return this.currentIndex < this.docList.length - 1 && this.currentIndex !== -1;
    }
  };
}
</script>

<!-- ESTILOS ADICIONAIS (Adicionar ao CSS)        -->
<!-- ============================================ -->
<style>
/* ===== Document Viewer Overlay ===== */
.document-viewer-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
}

.dv-overlay {
  position: absolute;
  inset: 0;
  background: rgba(13, 17, 27, 0.85);
  backdrop-filter: blur(4px);
}

/* ===== Painel Slide-over ===== */
.dv-panel {
  position: absolute;
  top: 0;
  bottom: 0;
  right: 0;
  background: linear-gradient(180deg, #0d111b 0%, #090d16 100%);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.dv-panel-desktop {
  width: 60%;
  max-width: 900px;
  min-width: 600px;
  border-left: 1px solid rgba(255, 255, 255, 0.12);
}

.dv-panel-mobile {
  width: 100%;
  left: 0;
}

/* ===== Container ===== */
.dv-container {
  display: flex;
  height: 100%;
  overflow: hidden;
}

.dv-container.with-toc {
  display: grid;
  grid-template-columns: 220px 1fr;
}

/* ===== TOC Lateral ===== */
.dv-toc {
  background: rgba(15, 23, 38, 0.8);
  border-right: 1px solid rgba(255, 255, 255, 0.08);
  padding: 20px 16px;
  overflow-y: auto;
}

.dv-toc-header {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #9fb0d2;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.dv-toc-nav {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.dv-toc-link {
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.4;
  color: #b8c5de;
  text-decoration: none;
  transition: all 0.2s;
  border-left: 2px solid transparent;
}

.dv-toc-link:hover {
  background: rgba(255, 255, 255, 0.05);
  color: #ecf2ff;
}

.dv-toc-link.active {
  background: rgba(0, 208, 200, 0.1);
  color: #00d0c8;
  border-left-color: #00d0c8;
}

/* TOC Mobile */
.dv-toc-toggle {
  width: 100%;
  display: flex;

<!-- INTEGRAÇÃO COM searchApp                     -->
<!-- ============================================ -->
<script>
// Adicionar ao searchApp existente para integração
// Ou usar eventos como mostrado abaixo:

// Método 1: Via evento (recomendado)
// searchApp dispara:
//   window.dispatchEvent(new CustomEvent('open-document-viewer', {
//     detail: { docId: 'uuid', context: 'opcional' }
//   }));

// Método 2: Via função global
window.openDocumentViewer = function(docId, context) {
  window.dispatchEvent(new CustomEvent('open-document-viewer', {
    detail: { docId, context }
  }));
};

// Escutar eventos do documentViewer
window.addEventListener('documentViewer.search', (e) => {
  // Redirecionar para busca
  const query = e.detail.query;
  if (window.searchApp && window.searchApp.search) {
    window.searchApp.search(query);
  } else {
    // Fallback: atualizar URL e recarregar
    window.location.href = `/?q=${encodeURIComponent(query)}`;
  }
});

window.addEventListener('documentViewer.closed', () => {
  // Callback quando viewer fecha
  console.log('Document viewer closed');
});
</script>
