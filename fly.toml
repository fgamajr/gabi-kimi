# GABI Worker - Fly.io Configuration
# Deploy: fly deploy
#
# NOTA: Gabi.Worker é um BackgroundService, não uma API HTTP.
# Não expõe portas - roda como worker process.

app = 'gabi-worker'
primary_region = 'gru'  # São Paulo

[build]
  dockerfile = "Dockerfile"

[env]
  DOTNET_ENVIRONMENT = "Production"
  GABI_ENVIRONMENT = "fly"
  GABI_LOG_LEVEL = "info"
  GABI_SOURCES_PATH = "sources_v2.yaml"

# Worker process (não é HTTP service)
# Fly mantém o processo rodando, reinicia se cair
[processes]
  app = "dotnet Gabi.Worker.dll"

# Secrets (configure via: fly secrets set)
# - ConnectionStrings__Default
# - GABI_ELASTICSEARCH_URL
# - GABI_REDIS_URL

[[vm]]
  size = 'shared-cpu-2x'
  memory = '1gb'
