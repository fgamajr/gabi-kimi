entry:
  type: url
  template: "https://www.in.gov.br/leiturajornal?data={date}"
  parameters:
    date:
      type: date_range
      start: "current-30d"
      end: current
      format: "dd-MM-yyyy"

navigation:
  - action: load
  - action: wait_for
    selector: "a"
    timeout_ms: 10000
  - action: extract_links
    selector: "a"
    attribute: "href"
    store_as: "page_links"

pagination:
  strategy: discover_links
  selector: "a"
  extract_attribute: "href"
  follow_if: "leiturajornal?data="
  deduplicate: true

extraction:
  links:
    - name: document_links
      selector: "a"
      attribute: "href"
      absolute: true
      filter:
        contains: ".pdf"

termination:
  max_pages: 200
  stop_if_duplicate_page: true
  stop_if_no_new_links: false

url_resolution:
  resolve_relative: true
  base_from_response: true
  normalize: true

runtime:
  mode: http
  render_js: false
  timeout_ms: 30000
  traversal: bfs
