sources:
  dou_legal_publication:
    crawl: {}
    model:
      dsl_version: "1.0"
      namespace: dou
      entities:
        publication:
          table: publication
          identity:
            primary_key:
              field: id
              type: uuid
          fields:
            id: { type: uuid, required: true, nullable: false }
            source_id: { type: string, required: true, nullable: false }
            external_id: { type: string, required: true, nullable: false }
            edition_date: { type: date, required: true, nullable: false }
            published_at: { type: datetime, required: true, nullable: false }
            section:
              type: enum
              required: true
              nullable: false
              enum_values: [S1, S2, S3]
            title: { type: text, required: true, nullable: false }
            body: { type: text, required: true, nullable: false }
            signatures:
              type: array
              required: false
              items:
                type: object
                fields:
                  name: { type: string, required: true, nullable: false }
                  role: { type: string, required: false, nullable: true }
          constraints:
            unique:
              - name: uq_publication_source_external
                fields: [source_id, external_id]
          indexes:
            - name: idx_publication_edition_date
              fields: [edition_date]
              method: btree
              unique: false
