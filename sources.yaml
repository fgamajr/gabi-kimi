version: 1

defaults:
  retry_policy:
    max_retries: 3
    backoff: exponential
  encoding: utf-8
  timeout: 300

sources:
  # ==============================================================================
  # TCU - Tribunal de Contas da União (Acórdãos)
  # ==============================================================================
  tcu_acordaos:
    metadata:
      domain: juridico
      jurisdiction: BR
      authority: TCU
      document_type: acordao
      canonical_type: legal_decision
      description: "Acórdãos completos do Tribunal de Contas da União (1992-current)"

    discovery:
      mode: url_pattern
      url_template: "https://sites.tcu.gov.br/dados-abertos/jurisprudencia/arquivos/acordao-completo/acordao-completo-{year}.csv"
      params:
        year:
          start: 1992
          end: "current"
      change_detection:
        strategy: etag

    fetch:
      protocol: https
      method: GET
      output:
        format: csv
        encoding: utf-8
        delimiter: "|"
        quote_char: '"'

    parse:
      input_format: csv
      strategy: row_to_document
      tool: built_in

    mapping:
      document_id: {from: "KEY", transform: strip_quotes}
      year: {from: "ANOACORDAO", transform: strip_quotes}
      number: {from: "NUMACORDAO", transform: strip_quotes}
      numata: {from: "NUMATA", transform: strip_quotes}
      type: {from: "TIPO", transform: strip_quotes}
      title: {from: "TITULO", transform: strip_quotes}
      colegiado: {from: "COLEGIADO", transform: strip_quotes}
      relator: {from: "RELATOR", transform: strip_quotes}
      date: {from: "DATASESSAO", transform: strip_quotes}
      process: {from: "PROC", transform: strip_quotes}
      # Full text fields
      text_relatorio: {from: "RELATORIO", transform: strip_quotes_and_html}
      text_voto: {from: "VOTO", transform: strip_quotes_and_html}
      text_acordao: {from: "ACORDAO", transform: strip_quotes_and_html}
      text_decisao: {from: "DECISAO", transform: strip_quotes_and_html}
      # Metadata fields
      situacao: {from: "SITUACAO", transform: strip_quotes}
      assunto: {from: "ASSUNTO", transform: strip_quotes}
      document_id_template: "{source}-{number}/{year}"

    lifecycle:
      sync:
        frequency: daily
        schedule: "0 2 * * *"
        mode: incremental
      resync:
        trigger: [schema_change, parser_update]
        keep_versions: 3
      purge:
        retention_days: 36500 # ~100 years (archival)
        cascade: [embeddings, index]
      validation:
        schema_check: true
        required_fields: [document_id, year, number, text_acordao]

    indexing:
      enabled: true
      strategy: hybrid
      fields:
        - text_relatorio
        - text_voto
        - text_acordao
        - text_decisao
        - metadata.relator
        - metadata.assunto

    embedding:
      enabled: true
      chunking:
        unit: semantic_section
        overlap: none

  # ==============================================================================
  # TCU - Normas Internas
  # ==============================================================================
  tcu_normas:
    metadata:
      domain: juridico
      jurisdiction: BR
      authority: TCU
      document_type: norma
      canonical_type: legal_norm
      description: "Normas internas do TCU"

    discovery:
      mode: static_url
      url: "https://sites.tcu.gov.br/dados-abertos/normas/arquivos/norma.csv"
      change_detection:
        strategy: etag

    fetch:
      protocol: https
      method: GET
      max_size_mb: 1024  # Allow 1GB (587MB file + margin) - enables streaming large files
      output:
        format: csv
        encoding: utf-8
        delimiter: "|"
        quote_char: '"'

    parse:
      input_format: csv
      strategy: row_to_document
      streaming: true  # TRUE streaming - file-size independent, works with timeout=None
      batch_size: 10  # Process and commit documents in batches of 10
      max_rows: 1000000  # Safety limit
      max_parse_size_bytes: 1073741824  # 1GB - match fetcher limit (fallback for non-streaming)

    mapping:
      document_id: {from: "KEY", transform: strip_quotes}
      year: {from: "ANONORMA", transform: strip_quotes}
      number: {from: "NUMNORMA", transform: strip_quotes}
      type: {from: "TIPONORMA", transform: strip_quotes}
      title: {from: "TITULO", transform: strip_quotes}
      assunto: {from: "ASSUNTO", transform: strip_quotes}
      situacao: {from: "SITUACAO", transform: strip_quotes}
      text_norma: {from: "TEXTONORMA", transform: strip_quotes}
      url: {from: "LINKBTCU", transform: strip_quotes}

    lifecycle:
      sync:
        frequency: daily
        schedule: "0 3 * * *"
        mode: full_reload # It's a single file
      purge:
        retention_days: 36500
      validation:
        required_fields: [document_id, number, type, text_norma]

    indexing:
      enabled: true
      strategy: hybrid
      fields: [text_norma, metadata.assunto]

    embedding:
      enabled: true
      chunking:
        unit: article 
        overlap: none

  # ==============================================================================
  # TCU - Súmulas
  # ==============================================================================
  tcu_sumulas:
    metadata:
      domain: juridico
      jurisdiction: BR
      authority: TCU
      document_type: sumula
      canonical_type: jurisprudence_highlight

    discovery:
      mode: static_url
      url: "https://sites.tcu.gov.br/dados-abertos/jurisprudencia/arquivos/sumula/sumula.csv"

    fetch:
      protocol: https
      method: GET
      output: {format: csv, delimiter: "|"}

    parse:
      input_format: csv

    mapping:
      document_id: {from: "KEY", transform: strip_quotes}
      number: {from: "NUMERO", transform: strip_quotes}
      year: {from: "ANOAPROVACAO", transform: strip_quotes}
      text_enunciado: {from: "ENUNCIADO", transform: strip_quotes}
      text_excerto: {from: "EXCERTO", transform: strip_quotes}
      vigente: {from: "VIGENTE", transform: strip_quotes}
      document_id_template: "SUMULA-{number}/{year}"

    lifecycle:
      sync: {frequency: daily, schedule: "0 3 * * *"}
      validation: {required_fields: [number, text_enunciado]}

    indexing:
      enabled: true
      fields: [text_enunciado, text_excerto]

    embedding:
      enabled: true
      chunking: {unit: whole_document}

  # ==============================================================================
  # TCU - Jurisprudência Selecionada
  # ==============================================================================
  tcu_jurisprudencia_selecionada:
    metadata:
      domain: juridico
      jurisdiction: BR
      authority: TCU
      document_type: jurisprudencia_selecionada
      canonical_type: jurisprudence_highlight

    discovery:
      mode: static_url
      url: "https://sites.tcu.gov.br/dados-abertos/jurisprudencia/arquivos/jurisprudencia-selecionada/jurisprudencia-selecionada.csv"

    fetch:
      protocol: https
      method: GET
      output: {format: csv, delimiter: "|"}

    parse: {input_format: csv}

    mapping:
      document_id: {from: "KEY", transform: strip_quotes}
      number: {from: "NUMACORDAO", transform: strip_quotes}
      year: {from: "ANOACORDAO", transform: strip_quotes}
      text_enunciado: {from: "ENUNCIADO", transform: strip_quotes}
      text_excerto: {from: "EXCERTO", transform: strip_quotes}
      text_paragrafo: {from: "PARAGRAFOLC", transform: strip_quotes}

    lifecycle:
      sync: {frequency: daily, schedule: "0 4 * * *"}

    indexing: {enabled: true, fields: [text_enunciado, text_excerto]}
    embedding: {enabled: true, chunking: {unit: whole_document}}

  # ==============================================================================
  # TCU - Resposta a Consulta
  # ==============================================================================
  tcu_resposta_consulta:
    metadata:
      domain: juridico
      jurisdiction: BR
      authority: TCU
      document_type: resposta_consulta
      canonical_type: jurisprudence_highlight

    discovery:
      mode: static_url
      url: "https://sites.tcu.gov.br/dados-abertos/jurisprudencia/arquivos/resposta-consulta/resposta-consulta.csv"

    fetch:
      protocol: https
      method: GET
      output: {format: csv, delimiter: "|"}

    parse: {input_format: csv}

    mapping:
      document_id: {from: "KEY", transform: strip_quotes}
      number: {from: "NUMACORDAO", transform: strip_quotes}
      year: {from: "ANOACORDAO", transform: strip_quotes}
      text_enunciado: {from: "ENUNCIADO", transform: strip_quotes}
      text_excerto: {from: "EXCERTO", transform: strip_quotes}

    lifecycle:
      sync: {frequency: daily, schedule: "0 4 * * *"}

    indexing: {enabled: true, fields: [text_enunciado, text_excerto]}
    embedding: {enabled: true, chunking: {unit: whole_document}}

  # ==============================================================================
  # TCU - Informativo de Licitações e Contratos
  # ==============================================================================
  tcu_informativo_lc:
    metadata:
      domain: juridico
      jurisdiction: BR
      authority: TCU
      document_type: informativo
      canonical_type: jurisprudence_highlight

    discovery:
      mode: static_url
      url: "https://sites.tcu.gov.br/dados-abertos/jurisprudencia/arquivos/boletim-informativo-lc/boletim-informativo-lc.csv"

    fetch:
      protocol: https
      method: GET
      output: {format: csv, delimiter: "|"}

    parse: {input_format: csv}

    mapping:
      document_id: {from: "KEY", transform: strip_quotes}
      title: {from: "TITULO", transform: strip_quotes}
      number: {from: "NUMERO", transform: strip_quotes}
      text_acordao: {from: "TEXTOACORDAO", transform: strip_quotes}
      text_enunciado: {from: "ENUNCIADO", transform: strip_quotes}
      text_info: {from: "TEXTOINFO", transform: strip_quotes}

    lifecycle:
      sync: {frequency: daily, schedule: "0 5 * * *"}

    indexing: {enabled: true}
    embedding: {enabled: true}

  # ==============================================================================
  # TCU - Boletim de Jurisprudência
  # ==============================================================================
  tcu_boletim_jurisprudencia:
    metadata:
      domain: juridico
      jurisdiction: BR
      authority: TCU
      document_type: boletim
      canonical_type: jurisprudence_highlight

    discovery:
      mode: static_url
      url: "https://sites.tcu.gov.br/dados-abertos/jurisprudencia/arquivos/boletim-jurisprudencia/boletim-jurisprudencia.csv"

    fetch:
      protocol: https
      method: GET
      output: {format: csv, delimiter: "|"}

    parse: {input_format: csv}

    mapping:
      document_id: {from: "KEY", transform: strip_quotes}
      title: {from: "TITULO", transform: strip_quotes}
      text_enunciado: {from: "ENUNCIADO", transform: strip_quotes}
      text_referencia: {from: "REFERENCIA", transform: strip_quotes}
      text_acordao: {from: "TEXTOACORDAO", transform: strip_quotes}

    lifecycle:
      sync: {frequency: daily, schedule: "0 5 * * *"}

    indexing: {enabled: true}
    embedding: {enabled: true}

  # ==============================================================================
  # TCU - Boletim de Pessoal
  # ==============================================================================
  tcu_boletim_pessoal:
    metadata:
      domain: juridico
      jurisdiction: BR
      authority: TCU
      document_type: boletim_pessoal
      canonical_type: jurisprudence_highlight

    discovery:
      mode: static_url
      url: "https://sites.tcu.gov.br/dados-abertos/jurisprudencia/arquivos/boletim-pessoal/boletim-pessoal.csv"

    fetch:
      protocol: https
      method: GET
      output: {format: csv, delimiter: "|"}

    parse: {input_format: csv}

    mapping:
      document_id: {from: "KEY", transform: strip_quotes}
      title: {from: "TITULO", transform: strip_quotes}
      number: {from: "NUMERO", transform: strip_quotes}
      text_enunciado: {from: "ENUNCIADO", transform: strip_quotes}
      text_referencia: {from: "REFERENCIA", transform: strip_quotes}
      text_acordao: {from: "TEXTOACORDAO", transform: strip_quotes}

    lifecycle:
      sync: {frequency: daily, schedule: "0 5 * * *"}

    indexing: {enabled: true}
    embedding: {enabled: true}

  # ==============================================================================
  # TCU - Publicações Institucionais (PDF)
  # ==============================================================================
  tcu_publicacoes:
    metadata:
      domain: juridico
      jurisdiction: BR
      authority: TCU
      document_type: publicacao
      canonical_type: publication
      description: "Publicações institucionais em PDF"

    discovery:
      mode: crawler
      root_url: "https://portal.tcu.gov.br/publicacoes-institucionais/todas"
      rules:
        pagination_param: "pagina"
        link_selector: "a[href*='/publicacoes-institucionais/']:not([href$='todas'])"
        asset_selector: "a[href$='.pdf']"
        max_depth: 2
        rate_limit: 1.0

    fetch:
      protocol: https
      method: GET
      output: {format: pdf}

    parse:
      input_format: pdf
      strategy: layout_aware
      tool: pymupdf

    mapping:
      title: {from: "metadata.title"}
      source_url: {from: "metadata.url"}

    lifecycle:
      sync: {frequency: weekly, schedule: "0 6 * * 0"}
      validation: {required_fields: [title]}

    indexing: {enabled: true}
    embedding: {enabled: true}

  # ==============================================================================
  # TCU - Notas Técnicas SEFTI
  # ==============================================================================
  tcu_notas_tecnicas_ti:
    metadata:
      domain: juridico
      jurisdiction: BR
      authority: TCU
      document_type: nota_tecnica
      canonical_type: technical_note

    discovery:
      mode: crawler
      root_url: "https://portal.tcu.gov.br/tecnologia-da-informacao/notas-tecnicas"
      rules:
        asset_selector: "a[href$='.pdf']"
        max_depth: 1

    fetch:
      protocol: https
      method: GET
      output: {format: pdf}

    parse:
      input_format: pdf
      strategy: layout_aware

    mapping:
      title: {from: "link_text_or_metadata"}
      source_url: {from: "url"}

    lifecycle:
      sync: {frequency: weekly, schedule: "0 6 * * 0"}

    indexing: {enabled: true}
    embedding: {enabled: true}

  # ==============================================================================
  # Câmara dos Deputados - Leis Ordinárias
  # ==============================================================================
  camara_leis_ordinarias:
    metadata:
      domain: juridico
      jurisdiction: BR
      authority: CAMARA
      document_type: lei
      canonical_type: legislation

    discovery:
      mode: api_query
      # Implementation specific: requires specialized fetcher logic or generic API walker
      # We define the pattern:
      driver: camara_api_v1
      params:
        start_year: 1980
        end_year: 2024

    fetch:
      protocol: https
      method: GET
      output: {format: html}

    parse:
      input_format: html
      strategy: legislation_structure
      rules:
        content_selector: "div#content"
        remove: [".revogado", "strike"]

    mapping:
      title: {from: "metadata.title"}
      number: {from: "metadata.number"}
      year: {from: "metadata.year"}

    lifecycle:
      sync: {frequency: weekly}

    indexing: {enabled: true}
    embedding: {enabled: true}

  # ==============================================================================
  # STF & STJ (Disabled)
  # ==============================================================================
  stf_decisoes:
    enabled: false
    metadata: {domain: juridico, authority: STF, canonical_type: legal_decision}
    discovery: {mode: static_url, url: "https://api.stf.jus.br/decisoes.csv"}
    fetch: {protocol: https, output: {format: csv}}
    parse: {input_format: csv}
    lifecycle: {sync: {frequency: daily}}

  stj_acordaos:
    enabled: false
    metadata: {domain: juridico, authority: STJ, canonical_type: legal_decision}
    discovery:
      mode: url_pattern
      url_template: "https://api.stj.jus.br/acordaos/{year}.csv"
      params: {year: {start: 2020, end: current}}
    fetch: {protocol: https, output: {format: csv}}
    parse: {input_format: csv}
    lifecycle: {sync: {frequency: daily}}


# ==============================================================================
# Legacy MCP Tools (Reference)
# ==============================================================================
mcp_tools:
  list_sources:
    description: "List all available data sources"
    parameters: {type: object, properties: {}}

  search:
    description: "Full-text search"
    parameters:
      type: object
      properties:
        sources: {type: array, items: {type: string}}
        query: {type: string}
        limit: {type: integer, default: 10}
      required: [sources, query]

  get_source_stats:
    description: "Get statistics"
    parameters:
      type: object
      properties:
        source: {type: string}
        agg_fields: {type: array, items: {type: string}}
      required: [source]

  get_document:
    description: "Retrieve by hash"
    parameters:
      type: object
      properties:
        content_hash: {type: string}
      required: [content_hash]

  search_tcu_documents:
    description: "Hybrid search"
    parameters:
      type: object
      properties:
        query: {type: string}
        filters: {type: object}
      required: [query]

  get_tcu_document_by_id:
    description: "Retrieve by ID"
    parameters:
      type: object
      properties:
        document_id: {type: string}
      required: [document_id]