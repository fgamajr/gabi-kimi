      ingest:
        readiness: metadata_only
        empty_content_action: metadata_only

  # ─────────────────────────────────────────────────────────────────────────────
  # 12. TCU - YouTube Videos (CANARY, INACTIVE)
  # ─────────────────────────────────────────────────────────────────────────────
  tcu_youtube_videos:
    enabled: true

    identity:
      name: "TCU - YouTube Videos"
      description: "Vídeos oficiais do TCU via YouTube Data API v3"
      provider: TCU
      domain: legal
      jurisdiction: BR
      category: multimedia
      canonical_type: session_media

    discovery:
      strategy: api_pagination
      config:
        driver: youtube_channel_v1
        http:
          timeout: "30s"
          request_delay_ms: 200

    fetch:
      protocol: https
      method: GET
      content_strategy: link_only
      content_profile: media
      format:
        type: json

    pipeline:
      enabled: false
      schedule: "0 6 * * 1"
      mode: incremental

  # ─────────────────────────────────────────────────────────────────────────────
  # 13. TCU - X Mentions (CANARY, INACTIVE)
  # ─────────────────────────────────────────────────────────────────────────────
  tcu_x_mentions:
    enabled: false

    identity:
      name: "TCU - X Mentions"
      description: "Menções ao TCU/Tribunal de Contas da União no X"
      provider: SOCIAL
      domain: legal
      jurisdiction: BR
      category: social_media
      canonical_type: social_mention

    discovery:
      strategy: api_pagination
      config:
        driver: x_mentions_v1
        endpoint_template: "https://api.x.com/2/tweets/search/recent?query={query}&max_results=100"
        query: "\"Tribunal de Contas da União\" OR \"@TCUoficial\" OR \"TCU\" -is:retweet lang:pt"
        http:
          timeout: "30s"
          request_delay_ms: 1000

    fetch:
      protocol: https
      method: GET
      content_strategy: link_only
      format:
        type: json

    pipeline:
      enabled: false
      schedule: "0 */6 * * *"
      mode: incremental

  # ─────────────────────────────────────────────────────────────────────────────
  # 14. TCU - Media Upload (CANARY, API INGEST)
  # ─────────────────────────────────────────────────────────────────────────────
  tcu_media_upload:
    enabled: true

    identity:
      name: "TCU - Media Upload"
      description: "Ingestão reversa via API para mídia de sessões e julgamentos"
      provider: TCU
      domain: legal
      jurisdiction: BR
      category: multimedia
      canonical_type: session_media

    discovery:
      strategy: static_url
      config:
        url: "upload://tcu_media_upload"

    fetch:
      protocol: upload
      method: POST
      content_strategy: media_transcribe
      content_profile: media
      format:
        type: media

    pipeline:
      enabled: false
      schedule: "0 3 * * *"
      mode: manual

  # ─────────────────────────────────────────────────────────────────────────────
  # 14. STF - Decisões (INACTIVE)
  # ─────────────────────────────────────────────────────────────────────────────
  stf_decisoes:
    enabled: false

    identity:
      name: "STF - Decisões"
      description: "Decisões do Supremo Tribunal Federal"
      provider: STF
      domain: legal
      jurisdiction: BR
      category: jurisprudence
      canonical_type: legal_decision

    discovery:
      strategy: static_url
      config:
        url: "https://api.stf.jus.br/decisoes.csv"

    fetch:
      protocol: https
      method: GET
      format:
        type: csv

    parse:
      strategy: csv_row_to_document

    pipeline:
      enabled: false
      schedule: "0 8 * * *"
      mode: incremental

  # ─────────────────────────────────────────────────────────────────────────────
  # 15. STJ - Acórdãos (INACTIVE)
  # ─────────────────────────────────────────────────────────────────────────────
  stj_acordaos:
    enabled: false

    identity:
      name: "STJ - Acórdãos"
      description: "Acórdãos do Superior Tribunal de Justiça"
      provider: STJ
      domain: legal
      jurisdiction: BR
      category: jurisprudence
      canonical_type: legal_decision

    discovery:
      strategy: url_pattern
      config:
        template: "https://api.stj.jus.br/acordaos/{year}.csv"
        parameters:
          year:
            type: range
            start: 2020
            end: current

    fetch:
      protocol: https
      method: GET
      format:
        type: csv

    parse:
      strategy: csv_row_to_document

    pipeline:
      enabled: false
      schedule: "0 8 * * *"
      mode: incremental

# ═══════════════════════════════════════════════════════════════════════════════
# TRANSFORMS (Reusable transform functions)
# ═══════════════════════════════════════════════════════════════════════════════
transforms:
  strip_quotes:
    description: "Remove surrounding quotes from string"
    type: builtin
    
  strip_quotes_and_html:
    description: "Remove quotes and HTML tags"
    type: builtin
    pipeline: [strip_quotes, strip_html]
    
  strip_html:
    description: "Remove HTML tags from content"
    type: builtin
    options:
      allowed_tags: []  # Empty = strip all
      
  parse_int:
    description: "Parse string to integer"
    type: builtin
    
  parse_date:
    description: "Parse date string to ISO format"
    type: builtin
    options:
      input_formats: ["%d/%m/%Y", "%Y-%m-%d"]
      output_format: "iso"
      
  parse_boolean:
    description: "Parse various boolean representations"
    type: builtin
    options:
      true_values: ["true", "1", "yes", "sim", "S", "s"]
      false_values: ["false", "0", "no", "nao", "N", "n"]

# ═══════════════════════════════════════════════════════════════════════════════
# VALIDATION RULES (Reusable validation rules)
# ═══════════════════════════════════════════════════════════════════════════════
validation_rules:
  required_fields:
    description: "Ensure specified fields are present and non-empty"
    
  field_format:
    description: "Validate field matches regex pattern"
    
  content_length:
    description: "Validate content meets minimum length"
    
  unique_document_id:
    description: "Ensure document_id is unique within source"
