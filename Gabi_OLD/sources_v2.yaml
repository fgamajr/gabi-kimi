        sections: ["do3"]
        parameters:
          date_range:
            type: range
            start: "2026-01-01"
            end: current
        http:
          user_agent_mode: fixed
          user_agent: "GabiBot/1.0 (+https://example.org/bot)"
          headers:
            Cookie: "${GABI_INLABS_COOKIE}"
          timeout: "120s"
          request_delay_ms: 600

    fetch:
      protocol: https
      method: GET
      content_strategy: link_only
      converter: html_to_text
      format:
        type: html

    pipeline:
      enabled: false
      schedule: "0 6 * * *"
      mode: incremental

  # ─────────────────────────────────────────────────────────────────────────────
  # 14. Câmara dos Deputados - Leis Ordinárias (API Query)
  # ─────────────────────────────────────────────────────────────────────────────
  camara_leis_ordinarias:
    identity:
      name: "Câmara dos Deputados - Proposições PL (não normas vigentes)"
      description: "Proposições do tipo PL na API da Câmara (tramitação legislativa, não legislação consolidada)"
      provider: CAMARA
      domain: legal
      jurisdiction: BR
      category: legislation
      canonical_type: legislation

    discovery:
      strategy: api_pagination
      config:
        driver: camara_api_v1
        endpoint_template: "https://dadosabertos.camara.leg.br/api/v2/proposicoes?siglaTipo=PL&ano={year}&itens=100&ordem=ASC&ordenarPor=id"
        parameters:
          start_year:
            type: range
            start: 1980
            end: current
        http:
          user_agent_mode: rotate
          user_agents:
            - "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/133.0.0.0 Safari/537.36"
            - "GabiBot/1.0 (+https://example.org/bot)"
          timeout: "180s"
          request_delay_ms: 1000

    fetch:
      protocol: https
      method: GET
      content_strategy: link_only
      converter: html_to_text
      format:
        type: html

    parse:
      strategy: legislation_structure
      tool: built_in

      rules:
        content_selector: "div#content"
        remove: [".revogado", "strike"]

      fields:
        title:
          source: metadata.title

        number:
          source: metadata.number

        year:
          source: metadata.year

        metadata: {}

      document:
        id_template: "lei-{number}/{year}"
        title_template: "Lei nº {number}/{year}"
        content_fields: [content]

    pipeline:
      enabled: true
      schedule: "0 7 * * 0"  # Weekly on Sunday
      mode: incremental
      ingest:
        readiness: metadata_only
        empty_content_action: metadata_only

      optional:
        embed:
          enabled: true
        index:
          enabled: true

