  # ─────────────────────────────────────────────────────────────────────────────
  # 9. TCU - Publicações Institucionais (PDF Crawler)
  # ─────────────────────────────────────────────────────────────────────────────
  tcu_publicacoes:
    identity:
      name: "TCU - Publicações Institucionais"
      description: "Publicações institucionais em PDF do TCU"
      provider: TCU
      domain: legal
      jurisdiction: BR
      category: publication
      canonical_type: publication

    discovery:
      strategy: web_crawl
      config:
        driver: "curl_html_v1"
        root_url: "https://portal.tcu.gov.br/publicacoes-institucionais/todas"
        rules:
          pagination_param: "pagina"
          link_selector: "a[href*='/publicacoes-institucionais/']:not([href$='todas'])"
          asset_selector: "a[href$='.pdf']"
          max_depth: 2
          rate_limit: 1.0
        http:
          user_agent_mode: rotate
          user_agents:
            - "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/133.0.0.0 Safari/537.36"
            - "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/133.0.0.0 Safari/537.36"
          timeout: "180s"

    fetch:
      protocol: https
      method: GET
      content_strategy: link_only
      converter: pdf_to_text_heuristic
      format:
        type: pdf

    parse:
      strategy: layout_aware
      tool: pymupdf

      fields:
        title:
          source: metadata.title

        source_url:
          source: metadata.url

        metadata: {}

      document:
        id_template: "publicacao-{document_id}"
        content_fields: [content]

    transform:
      validate:
        - rule: required_fields
          fields: [title]

    pipeline:
      enabled: true
      schedule: "0 6 * * 0"  # Weekly on Sunday
      mode: incremental
      ingest:
        readiness: metadata_only
        empty_content_action: metadata_only

      optional:
        embed:
          enabled: true

