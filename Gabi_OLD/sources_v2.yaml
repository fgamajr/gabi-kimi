  # ─────────────────────────────────────────────────────────────────────────────
  dou_dados_abertos_mensal:
    identity:
      name: "DOU - Base pública mensal (dados abertos)"
      description: "Catálogo público mensal de publicações do DOU para baseline histórico (sem autenticação)"
      provider: IMPRENSA_NACIONAL
      domain: legal
      jurisdiction: BR
      category: publication
      canonical_type: official_gazette

    discovery:
      strategy: api_pagination
      config:
        driver: dou_public_monthly_v1
        base_url: "https://www.in.gov.br/acesso-a-informacao/dados-abertos/base-de-dados"
        start_year: 2021
        end_year: current
        start_month: 1
        end_month: 12
        sections: ["S01"]
        http:
          request_delay_ms: 2000

    fetch:
      protocol: https
      method: GET
      content_strategy: link_only
      converter: zip_xml_dou
      format:
        type: archive

    pipeline:
      enabled: true
      schedule: "0 3 2 * *"  # mensal, após fechamento do mês anterior
      mode: incremental
      ingest:
        readiness: text_ready
        empty_content_action: metadata_only

  # ─────────────────────────────────────────────────────────────────────────────
  # 13. Diário Oficial da União (DOU) - INLABS XML (Fases B/C)
  # ─────────────────────────────────────────────────────────────────────────────
  # Complementary DOU strategy:
  #   - dou_dados_abertos_mensal: historical bulk (monthly ZIP archives from 2021)
  #   - dou_inlabs_secao1_atos_administrativos: real-time gap (last 30 days via INLABS XML)
  # Both sources are searched simultaneously. Documents may overlap in the 30-day window
  # but are deduplicated by ContentHash. YAML controls the window, not C# code.
  dou_inlabs_secao1_atos_administrativos:
    enabled: true
    identity:
      name: "DOU - Seção 1 - Atos Administrativos"
      description: "Diário Oficial da União (INLABS XML), foco em atos administrativos da Seção 1"
      provider: IMPRENSA_NACIONAL
      domain: legal
      jurisdiction: BR
      category: publication
      canonical_type: official_gazette

    discovery:
      strategy: api_pagination
      config:
        driver: dou_inlabs_xml_v1
        endpoint_template: "https://inlabs.in.gov.br/index.php?p={date}"
        sections: ["do1"]
        parameters:
          date_range:
            type: range
            start: "current-30d"
            end: current
        http:
          user_agent_mode: rotate
          user_agents:
            - "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36"
            - "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:124.0) Gecko/20100101 Firefox/124.0"
            - "Mozilla/5.0 (Macintosh; Intel Mac OS X 14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.3 Safari/605.1.15"
          headers:
            Cookie: "${GABI_INLABS_COOKIE}"
          timeout: "120s"
          request_delay_ms: 600

    fetch:
      protocol: https
      method: GET
      content_strategy: link_only
      converter: zip_xml_dou
      format:
        type: archive

    pipeline:
      enabled: true
      schedule: "0 6 * * *"
      mode: incremental
      ingest:
        readiness: text_ready
        empty_content_action: metadata_only
      coverage:
        zero_ok: true

  dou_inlabs_secao3_licitacoes_contratos:
    enabled: false
    identity:
      name: "DOU - Seção 3 - Licitações e Contratos"
      description: "Diário Oficial da União (INLABS XML), foco em extratos de licitação/contrato na Seção 3"
      provider: IMPRENSA_NACIONAL
      domain: legal
      jurisdiction: BR
      category: publication
