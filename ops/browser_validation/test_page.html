<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>GABI Validation Test</title>
    <style>
      body { font-family: system-ui, -apple-system, sans-serif; padding: 24px; }
      #msg { margin-top: 12px; color: #0b6; }
    </style>
  </head>
  <body>
    <h1 id="title">GABI Validation Test Page</h1>
    <p>This page is used by the agent to validate browser automation features.</p>

    <label for="name">Your name:</label>
    <input id="name" placeholder="type a name" />
    <button id="greet">Greet</button>

    <div id="msg" aria-live="polite"></div>

    <script>
      console.log('page-loaded');

      document.getElementById('greet').addEventListener('click', () => {
        const name = document.getElementById('name').value || 'world';
        const msg = 'Hello ' + name + '!';
        document.getElementById('msg').textContent = msg;
        console.warn('greet-clicked ' + name);
      });
    </script>
  </body>
</html>
