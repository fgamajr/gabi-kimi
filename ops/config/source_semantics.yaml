dou_documents:
  semantic_kind: ato_normativo_administrativo
  primary_sections:
    - corpo
    - ementa
  secondary_sections:
    - identifica
    - fundamento_legal
    - vigencia
  ementary_fields:
    - identifica
    - ementa
  semantic_fields:
    - tipo_ato
    - subtipo_ato
    - objeto
    - efeito_principal
    - vigencia
    - semantic_topics
  decision_field: efeito_principal
  problem_field: objeto
  year_field: pub_date
  llm_prompt_template: dou_documents_v1
  llm_prompt_version: h3_dou_documents_v1
  gate_policy:
    require_fields:
      - objeto
      - efeito_principal

tcu_acordao_completo:
  semantic_kind: decisao_colegiada
  primary_sections:
    - decisao
    - voto
    - relatorio
  secondary_sections:
    - acordao
    - sumario
  ementary_fields:
    - objeto
    - sumario
  semantic_fields:
    - numero
    - ano_acordao
    - colegiado
    - relator
    - tipo_processo
    - objeto
    - problematica
    - relatorio_resumo
    - voto_resumo
    - decisao
    - decisao_principal
    - semantic_topics
  decision_field: decisao
  problem_field: problematica
  year_field: ano_acordao
  llm_prompt_template: tcu_acordao_completo_v1
  llm_prompt_version: h3_tcu_acordao_v1
  topic_policy:
    prefer_sections:
      - decisao
      - voto
      - relatorio
    avoid_keyword_only: true
    drop_fns_health_only: true
  gate_policy:
    require_fields:
      - ano_acordao
      - problematica
      - decisao

