# Last verified: 2026-03-06
services:
  postgres:
    image: postgres:16-alpine
    container_name: gabi-postgres-appliance
    restart: unless-stopped
    environment:
      POSTGRES_USER: gabi
      POSTGRES_PASSWORD: gabi
      POSTGRES_DB: gabi
    ports:
      - "5433:5432"
    volumes:
      - gabi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gabi -d gabi"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 2s
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.2
    container_name: gabi-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - gabi_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
  redis:
    image: redis:7-alpine
    container_name: gabi-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - gabi_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
  # S3-compatible storage for admin upload (local dev). Create bucket "gabi-dou-uploads" once in console (http://localhost:9001).
  minio:
    image: minio/minio:latest
    container_name: gabi-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - gabi_minio_data:/data

volumes:
  gabi_postgres_data:
    name: gabi_postgres_data
  gabi_es_data:
    name: gabi_es_data
  gabi_redis_data:
    name: gabi_redis_data
  gabi_minio_data:
    name: gabi_minio_data
