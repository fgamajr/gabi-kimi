# GABI DOU — Elasticsearch single-node configuration
# Portuguese-optimized for Diario Oficial da Uniao documents

cluster.name: gabi-dou
node.name: es-gru-01

network.host: 0.0.0.0
discovery.type: single-node

xpack.security.enabled: false

path.data: /usr/share/elasticsearch/data

# Default index settings with Portuguese analysis
index:
  number_of_shards: 1
  number_of_replicas: 0
  analysis:
    analyzer:
      brazilian_text:
        type: custom
        tokenizer: standard
        filter:
          - lowercase
          - asciifolding
          - brazilian_stop
          - brazilian_stemmer
    filter:
      brazilian_stop:
        type: stop
        stopwords: _brazilian_
      brazilian_stemmer:
        type: stemmer
        language: brazilian
