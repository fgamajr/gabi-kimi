# Fly.io — GABI Elasticsearch (single-node)
# Internal-only search engine; accessed by web and worker via .internal DNS

app = 'gabi-dou-es'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'
  context = '../..'

[mounts]
  source = 'gabi_es_data'
  destination = '/usr/share/elasticsearch/data'

[[vm]]
  size = 'performance-2x'
  memory = '4096mb'

[deploy]
  strategy = 'immediate'

[checks]
  [checks.es_health]
    port = 9200
    type = 'http'
    method = 'GET'
    path = '/_cluster/health'
    interval = '30s'
    timeout = '5s'
    grace_period = '60s'
