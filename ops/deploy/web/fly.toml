# Fly.io — GABI Web Server (FastAPI) + ARQ Worker
# DOU search platform frontend + API; worker consumes jobs from Redis

app = 'gabi-dou-web'
primary_region = 'gru'

[build]
  dockerfile = 'ops/deploy/web/Dockerfile'

[env]
  # DB connection — internal Fly networking (6PN)
  PG_DSN = 'host=gabi-dou-db.internal port=5432 dbname=gabi user=gabi'
  # PG password comes from fly secrets
  GABI_SERVE_FRONTEND = 'false'
  GABI_SESSION_SAMESITE = 'none'
  GABI_ALLOWED_HOSTS = 'gabi-dou-web.fly.dev'
  GABI_CORS_ORIGINS = 'https://gabi-dou-frontend.fly.dev'
  REDIS_URL = 'redis://gabi-dou-redis.internal:6379/0'

[processes]
  web = "python ops/bin/web_server.py"
  worker = "arq src.backend.workers.arq_worker.WorkerSettings"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 40
    soft_limit = 30

  [[http_service.checks]]
    grace_period = '20s'
    interval = '30s'
    method = 'GET'
    path = '/api/stats'
    protocol = 'http'
    timeout = '5s'

[[vm]]
  processes = ["web"]
  size = 'shared-cpu-2x'
  memory = '512mb'

[[vm]]
  processes = ["worker"]
  size = 'shared-cpu-2x'
  memory = '1gb'
