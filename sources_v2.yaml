          chunk: true
          
        metadata:
          excerto: {source: EXCERTO, transforms: [strip_quotes]}
          vigente: {source: VIGENTE, transforms: [parse_boolean]}
          
      document:
        id_template: "sumula-{number}/{year}"
        title_template: "Súmula {number}"
        content_fields: [content]

    transform:
      validate:
        - rule: required_fields
          fields: [number, content]

    pipeline:
      enabled: true
      schedule: "0 4 * * *"
      mode: full_reload

      optional:
        embed:
          enabled: true
          chunking:
            strategy: whole_document

