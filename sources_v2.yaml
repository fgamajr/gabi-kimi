apiVersion: gabi.io/v2
kind: SourceCatalog
defaults:
  pipeline:
    retry:
      max_attempts: 3
      backoff: exponential
      initial_delay: 1s
      max_delay: 60s
    limits:
      max_file_size: 100MB
      max_documents: null
      timeout: 5m
      memory_threshold: 300MB
    coverage:
      strict: false
      zero_ok: false
    ingest:
      readiness: text_ready
      empty_content_action: fail
    backpressure:
      max_pending_fetch: 10000
      max_pending_ingest: 5000
      max_pending_embed: 500
    embed:
      max_chars_per_batch: 500000
      max_docs_per_batch: 32
      min_docs_per_batch: 1

sources:
  dou_inlabs_secao1_atos_administrativos:
    enabled: true
    identity:
      name: "DOU - Seção 1 - Atos Administrativos"
      description: "Diário Oficial da União (INLABS XML), foco em atos administrativos da Seção 1"
      provider: IMPRENSA_NACIONAL
      domain: legal
      jurisdiction: BR
      category: publication
      canonical_type: official_gazette

    discovery:
      strategy: api_pagination
      config:
        driver: dou_inlabs_xml_v1
        endpoint_template: "https://inlabs.in.gov.br/index.php?p={date}"
        sections: ["do1"]
        parameters:
          date_range:
            type: range
            start: "current-30d"
            end: current
        http:
          user_agent_mode: rotate
          user_agents:
            - "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36"
            - "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:124.0) Gecko/20100101 Firefox/124.0"
            - "Mozilla/5.0 (Macintosh; Intel Mac OS X 14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.3 Safari/605.1.15"
          headers:
            Cookie: "${GABI_INLABS_COOKIE}"
          timeout: "120s"
          request_delay_ms: 600

    fetch:
      protocol: https
      method: GET
      content_strategy: link_only
      converter: zip_xml_dou
      format:
        type: archive

    pipeline:
      enabled: true
      schedule: "0 6 * * *"
      mode: incremental
      ingest:
        readiness: text_ready
        empty_content_action: metadata_only
      coverage:
        zero_ok: true
