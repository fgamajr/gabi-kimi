  # 13. STJ - Acórdãos (INACTIVE)
  # ─────────────────────────────────────────────────────────────────────────────
  stj_acordaos:
    enabled: false

    identity:
      name: "STJ - Acórdãos"
      description: "Acórdãos do Superior Tribunal de Justiça"
      provider: STJ
      domain: legal
      jurisdiction: BR
      category: jurisprudence
      canonical_type: legal_decision

    discovery:
      strategy: url_pattern
      config:
        template: "https://api.stj.jus.br/acordaos/{year}.csv"
        parameters:
          year:
            type: range
            start: 2020
            end: current

    fetch:
      protocol: https
      method: GET
      format:
        type: csv

    parse:
      strategy: csv_row_to_document

    pipeline:
      enabled: false
      schedule: "0 8 * * *"
      mode: incremental

# ═══════════════════════════════════════════════════════════════════════════════
# TRANSFORMS (Reusable transform functions)
# ═══════════════════════════════════════════════════════════════════════════════
transforms:
  strip_quotes:
    description: "Remove surrounding quotes from string"
    type: builtin
    
  strip_quotes_and_html:
    description: "Remove quotes and HTML tags"
    type: builtin
    pipeline: [strip_quotes, strip_html]
    
  strip_html:
    description: "Remove HTML tags from content"
    type: builtin
    options:
      allowed_tags: []  # Empty = strip all
      
  parse_int:
    description: "Parse string to integer"
    type: builtin
    
  parse_date:
    description: "Parse date string to ISO format"
    type: builtin
    options:
      input_formats: ["%d/%m/%Y", "%Y-%m-%d"]
      output_format: "iso"
      
  parse_boolean:
    description: "Parse various boolean representations"
    type: builtin
    options:
      true_values: ["true", "1", "yes", "sim", "S", "s"]
      false_values: ["false", "0", "no", "nao", "N", "n"]

# ═══════════════════════════════════════════════════════════════════════════════
# VALIDATION RULES (Reusable validation rules)
# ═══════════════════════════════════════════════════════════════════════════════
validation_rules:
  required_fields:
    description: "Ensure specified fields are present and non-empty"
    
  field_format:
    description: "Validate field matches regex pattern"
    
  content_length:
    description: "Validate content meets minimum length"
    
  unique_document_id:
    description: "Ensure document_id is unique within source"
