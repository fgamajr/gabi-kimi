  # ─────────────────────────────────────────────────────────────────────────────
  # 9. TCU - Publicações Institucionais (PDF Crawler)
  # ─────────────────────────────────────────────────────────────────────────────
  tcu_publicacoes:
    identity:
      name: "TCU - Publicações Institucionais"
      description: "Publicações institucionais em PDF do TCU"
      provider: TCU
      domain: legal
      jurisdiction: BR
      category: publication
      canonical_type: publication

    discovery:
      strategy: web_crawl
      config:
        root_url: "https://portal.tcu.gov.br/publicacoes-institucionais/todas"
        rules:
          pagination_param: "pagina"
          link_selector: "a[href*='/publicacoes-institucionais/']:not([href$='todas'])"
          asset_selector: "a[href$='.pdf']"
          max_depth: 2
          rate_limit: 1.0

    fetch:
      protocol: https
      method: GET
      format:
        type: pdf

    parse:
      strategy: layout_aware
      tool: pymupdf

      fields:
