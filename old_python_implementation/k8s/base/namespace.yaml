apiVersion: v1
kind: Namespace
metadata:
  name: gabi
  labels:
    app: gabi
    environment: production
    istio-injection: enabled
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: gabi-quota
  namespace: gabi
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    persistentvolumeclaims: "10"
    services: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: gabi-limits
  namespace: gabi
spec:
  limits:
  - default:
      cpu: "2"
      memory: 4Gi
    defaultRequest:
      cpu: 500m
      memory: 1Gi
    type: Container
