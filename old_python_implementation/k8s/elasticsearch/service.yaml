apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: gabi
  labels:
    app: elasticsearch
    component: vector-db
spec:
  type: ClusterIP
  ports:
  - port: 9200
    targetPort: 9200
    name: http
  selector:
    app: elasticsearch
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-headless
  namespace: gabi
  labels:
    app: elasticsearch
    component: vector-db
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - port: 9200
    targetPort: 9200
    name: http
  - port: 9300
    targetPort: 9300
    name: transport
  selector:
    app: elasticsearch
