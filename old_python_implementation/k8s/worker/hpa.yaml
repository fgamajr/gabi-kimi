apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gabi-worker
  namespace: gabi
  labels:
    app: gabi-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gabi-worker
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: External
    external:
      metric:
        name: celery_queue_length
        selector:
          matchLabels:
            queue: gabi.default
      target:
        type: AverageValue
        averageValue: "10"
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Pods
        value: 5
        periodSeconds: 10
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
---
