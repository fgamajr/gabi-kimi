apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gabi-critical-alerts
  namespace: gabi
  labels:
    app: gabi
    component: monitoring
spec:
  groups:
    - name: gabi-critical
      interval: 30s
      rules:
        # API Availability
        - alert: GabiAPIDown
          expr: up{job="gabi-api-metrics"} == 0
          for: 2m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "GABI API is down"
            description: "GABI API has been down for more than 2 minutes"
            runbook_url: "https://wiki.internal/gabi/runbooks/api-down"

        - alert: GabiAPIHighErrorRate
          expr: |
            (
              sum(rate(http_requests_total{job="gabi-api-metrics",status=~"5.."}[5m]))
              /
              sum(rate(http_requests_total{job="gabi-api-metrics"}[5m]))
            ) > 0.05
          for: 5m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "GABI API high error rate"
            description: "Error rate is above 5% for more than 5 minutes"

        - alert: GabiAPIHighLatency
          expr: |
            histogram_quantile(0.95, 
              sum(rate(http_request_duration_seconds_bucket{job="gabi-api-metrics"}[5m])) by (le)
            ) > 2
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "GABI API high latency"
            description: "95th percentile latency is above 2 seconds"

        # Worker Health
        - alert: GabiWorkerDown
          expr: up{job="gabi-worker-metrics"} == 0
          for: 3m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "GABI Worker is down"
            description: "GABI Worker has been down for more than 3 minutes"

        - alert: GabiWorkerHighTaskFailureRate
          expr: |
            (
              sum(rate(celery_task_failed_total[5m]))
              /
              sum(rate(celery_task_total[5m]))
            ) > 0.1
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "GABI Worker high task failure rate"
            description: "Task failure rate is above 10%"

        - alert: GabiWorkerQueueBacklog
          expr: celery_queue_length{queue_name=~"gabi.*"} > 1000
          for: 10m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "GABI Worker queue backlog"
            description: "Queue {{ $labels.queue_name }} has more than 1000 pending tasks"

        # Database
        - alert: GabiPostgresDown
          expr: pg_up{namespace="gabi"} == 0
          for: 1m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "GABI PostgreSQL is down"
            description: "PostgreSQL database is not responding"

        - alert: GabiPostgresHighConnectionUsage
          expr: |
            (
              pg_stat_activity_count{namespace="gabi"}
              /
              pg_settings_max_connections{namespace="gabi"}
            ) > 0.8
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "GABI PostgreSQL high connection usage"
            description: "PostgreSQL connection usage is above 80%"

        # Elasticsearch
        - alert: GabiElasticsearchDown
          expr: elasticsearch_cluster_health_up{namespace="gabi"} == 0
          for: 2m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "GABI Elasticsearch is down"
            description: "Elasticsearch cluster is not healthy"

        - alert: GabiElasticsearchRedStatus
          expr: elasticsearch_cluster_health_status{color="red",namespace="gabi"} == 1
          for: 1m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "GABI Elasticsearch cluster is red"
            description: "Elasticsearch cluster health status is RED"

        - alert: GabiElasticsearchYellowStatus
          expr: elasticsearch_cluster_health_status{color="yellow",namespace="gabi"} == 1
          for: 10m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "GABI Elasticsearch cluster is yellow"
            description: "Elasticsearch cluster health status is YELLOW for more than 10 minutes"

        # Redis
        - alert: GabiRedisDown
          expr: redis_up{namespace="gabi"} == 0
          for: 2m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "GABI Redis is down"
            description: "Redis cache is not responding"

        - alert: GabiRedisHighMemoryUsage
          expr: |
            (
              redis_memory_used_bytes{namespace="gabi"}
              /
              redis_memory_max_bytes{namespace="gabi"}
            ) > 0.9
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "GABI Redis high memory usage"
            description: "Redis memory usage is above 90%"

        # Resource Usage
        - alert: GabiPodHighCPUUsage
          expr: |
            (
              container_cpu_usage_seconds_total{namespace="gabi",container!="POD"}
              /
              container_spec_cpu_quota{namespace="gabi",container!="POD"}
            ) > 0.8
          for: 10m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "GABI Pod high CPU usage"
            description: "Pod {{ $labels.pod }} CPU usage is above 80%"

        - alert: GabiPodHighMemoryUsage
          expr: |
            (
              container_memory_working_set_bytes{namespace="gabi",container!="POD"}
              /
              container_spec_memory_limit_bytes{namespace="gabi",container!="POD"}
            ) > 0.9
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "GABI Pod high memory usage"
            description: "Pod {{ $labels.pod }} memory usage is above 90%"

        - alert: GabiPodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total{namespace="gabi"}[15m]) > 0
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "GABI Pod is crash looping"
            description: "Pod {{ $labels.pod }} has restarted multiple times"

        # Backup
        - alert: GabiPostgresBackupFailed
          expr: time() - pg_backup_last_successful_time{namespace="gabi"} > 86400
          for: 1h
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "GABI PostgreSQL backup failed"
            description: "PostgreSQL backup has not succeeded in the last 24 hours"
