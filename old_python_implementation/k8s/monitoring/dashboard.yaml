apiVersion: v1
kind: ConfigMap
metadata:
  name: gabi-grafana-dashboard
  namespace: gabi
  labels:
    grafana_dashboard: "true"
    app: gabi
    component: monitoring
data:
  gabi-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "GABI Platform Overview Dashboard",
      "editable": true,
      "gnetId": null,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "datasource": null,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "panels": [],
          "title": "API Overview",
          "type": "row"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            }
          },
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 1},
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "pluginVersion": "8.0.0",
          "targets": [
            {
              "expr": "sum(up{job=\"gabi-api-metrics\"})",
              "refId": "A"
            }
          ],
          "title": "API Instances Up",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": true
              },
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "reqps"
            }
          },
          "gridPos": {"h": 8, "w": 10, "x": 4, "y": 1},
          "id": 3,
          "options": {
            "legend": {"calcs": [], "displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "single"}
          },
          "pluginVersion": "8.0.0",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"gabi-api-metrics\"}[5m])) by (status)",
              "legendFormat": "{{status}}",
              "refId": "A"
            }
          ],
          "title": "Request Rate by Status",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisLabel": "",
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": {"h": 8, "w": 10, "x": 14, "y": 1},
          "id": 4,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "right"},
            "tooltip": {"mode": "single"}
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=\"gabi-api-metrics\"}[5m])) by (le))",
              "legendFormat": "50th percentile",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"gabi-api-metrics\"}[5m])) by (le))",
              "legendFormat": "95th percentile",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"gabi-api-metrics\"}[5m])) by (le))",
              "legendFormat": "99th percentile",
              "refId": "C"
            }
          ],
          "title": "Request Latency",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "datasource": null,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 9},
          "id": 5,
          "panels": [],
          "title": "Worker & Queue",
          "type": "row"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 500},
                  {"color": "red", "value": 1000}
                ]
              }
            }
          },
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 10},
          "id": 6,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(celery_queue_length{namespace=\"gabi\"})",
              "refId": "A"
            }
          ],
          "title": "Queue Length",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 1,
                "showPoints": "never"
              },
              "unit": "short"
            }
          },
          "gridPos": {"h": 8, "w": 18, "x": 6, "y": 10},
          "id": 7,
          "options": {
            "legend": {"displayMode": "table", "placement": "right"},
            "tooltip": {"mode": "single"}
          },
          "targets": [
            {
              "expr": "sum(rate(celery_task_succeeded_total{namespace=\"gabi\"}[5m]))",
              "legendFormat": "Succeeded",
              "refId": "A"
            },
            {
              "expr": "sum(rate(celery_task_failed_total{namespace=\"gabi\"}[5m]))",
              "legendFormat": "Failed",
              "refId": "B"
            },
            {
              "expr": "sum(rate(celery_task_retried_total{namespace=\"gabi\"}[5m]))",
              "legendFormat": "Retried",
              "refId": "C"
            }
          ],
          "title": "Task Throughput",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "datasource": null,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 18},
          "id": 8,
          "panels": [],
          "title": "Infrastructure",
          "type": "row"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {"options": {"0": {"text": "Down"}}, "type": "value"},
                {"options": {"1": {"text": "Up"}}, "type": "value"}
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            }
          },
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 19},
          "id": 9,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}
          },
          "targets": [
            {
              "expr": "pg_up{namespace=\"gabi\"}",
              "legendFormat": "PostgreSQL",
              "refId": "A"
            },
            {
              "expr": "elasticsearch_cluster_health_up{namespace=\"gabi\"}",
              "legendFormat": "Elasticsearch",
              "refId": "B"
            },
            {
              "expr": "redis_up{namespace=\"gabi\"}",
              "legendFormat": "Redis",
              "refId": "C"
            }
          ],
          "title": "Data Stores",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"drawStyle": "line", "fillOpacity": 10},
              "unit": "percent"
            }
          },
          "gridPos": {"h": 8, "w": 10, "x": 4, "y": 19},
          "id": 10,
          "options": {"legend": {"displayMode": "table", "placement": "right"}},
          "targets": [
            {
              "expr": "(
                container_memory_working_set_bytes{namespace=\"gabi\",container!\"POD\",container!=\"\"}
                /
                container_spec_memory_limit_bytes{namespace=\"gabi\",container!\"POD\",container!=\"\"}
              ) * 100",
              "legendFormat": "{{pod}}/{{container}}",
              "refId": "A"
            }
          ],
          "title": "Memory Usage %",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"drawStyle": "line", "fillOpacity": 10},
              "unit": "percent"
            }
          },
          "gridPos": {"h": 8, "w": 10, "x": 14, "y": 19},
          "id": 11,
          "options": {"legend": {"displayMode": "table", "placement": "right"}},
          "targets": [
            {
              "expr": "(
                rate(container_cpu_usage_seconds_total{namespace=\"gabi\",container!\"POD\",container!=\"\"}[5m])
                /
                (container_spec_cpu_quota{namespace=\"gabi\",container!\"POD\",container!=\"\"} / 100000)
              ) * 100",
              "legendFormat": "{{pod}}/{{container}}",
              "refId": "A"
            }
          ],
          "title": "CPU Usage %",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 30,
      "style": "dark",
      "tags": ["gabi", "platform", "overview"],
      "templating": {
        "list": [
          {
            "current": {"selected": false, "text": "gabi", "value": "gabi"},
            "hide": 0,
            "label": "Namespace",
            "name": "namespace",
            "options": [],
            "query": "label_values(namespace)",
            "refresh": 1,
            "regex": "",
            "sort": 0,
            "type": "query"
          }
        ]
      },
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {"refresh_intervals": ["5s", "10s", "30s", "1m", "5m"]},
      "timezone": "browser",
      "title": "GABI Platform Overview",
      "uid": "gabi-overview",
      "version": 1
    }
