crawl:
  entry: "https://www.in.gov.br/leiturajornal?data=26-02-2026"

  runtime:
    mode: mock
    wait_dom: network_idle
    timeout: 20s
    seed: 42
    latency_ms: 1

  termination:
    max_pages: 200
    stop_if_no_new: true

  # Generic configurable mock behavior, not engine hardcoding.
  mock_rules:
    - when:
        contains: "/leiturajornal?data="
      selectors:
        "a[href*='/web/dou/-/']":
          count: 3
          url_template: "{base}/web/dou/-/section-{n}"

    - when:
        contains: "/web/dou/-/section-"
      selectors:
        "a[href*='/-/']":
          count: 5
          url_template: "{base}/web/dou/-/article-{token}-{n}"

  steps:
    - load: entry

    - wait:
        selector: "a[href*='/web/dou/-/']"

    - extract:
        name: section_pages
        selector: "a[href*='/web/dou/-/']"
        attribute: href
        absolute: true
        deduplicate: true

    - follow:
        from: section_pages

    - wait:
        selector: "a[href*='/-/']"

    - extract:
        name: article_pages
        selector: "a[href*='/-/']"
        attribute: href
        absolute: true
        deduplicate: true
        emit: document
