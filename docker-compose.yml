services:
  mongo:
    build:
      context: .
      dockerfile: ops/docker/mongo/Dockerfile
    image: gabi-kimi-mongo
    container_name: gabi-kimi-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  elasticsearch:
    build:
      context: .
      dockerfile: ops/docker/elasticsearch/Dockerfile
    image: gabi-kimi-elasticsearch
    container_name: gabi-kimi-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      cluster.routing.allocation.disk.threshold_enabled: "false"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    image: gabi-kimi-backend
    container_name: gabi-kimi-backend
    restart: unless-stopped
    depends_on:
      - mongo
      - elasticsearch
    environment:
      MONGO_STRING: mongodb://mongo:27017
      DB_NAME: gabi_dou
      ES_URL: http://elasticsearch:9200
      ES_INDEX: gabi_documents_v1
    ports:
      - "${BACKEND_PORT:-8001}:8000"

  frontend:
    build:
      context: .
      dockerfile: src/frontend/app/Dockerfile
    image: gabi-kimi-frontend
    container_name: gabi-kimi-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://backend:8000}
    ports:
      - "${FRONTEND_PORT:-8081}:8080"

volumes:
  mongo_data:
  es_data:
