services:
  mongo:
    image: mongo:7
    container_name: gabi-kimi-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - ${GABI_MONGO_DATA:-./.data/mongo}:/data/db

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.4
    container_name: gabi-kimi-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
      cluster.routing.allocation.disk.threshold_enabled: "false"
    volumes:
      - ${GABI_ES_DATA:-./.data/elasticsearch}:/usr/share/elasticsearch/data

  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    image: gabi-kimi-backend
    container_name: gabi-kimi-backend
    restart: unless-stopped
    depends_on:
      - mongo
      - elasticsearch
    environment:
      MONGO_STRING: mongodb://mongo:27017
      DB_NAME: gabi_dou
      ES_URL: http://elasticsearch:9200
      ES_INDEX: gabi_documents_v1
      ES_ALIAS: gabi_documents
      ES_SYNC_CURSOR_PATH: /data/gabi_dou/es_sync_cursor.json
      PIPELINE_TMP: /data/gabi_dou/pipeline
      ICLOUD_DATA_PATH: /data/gabi_dou
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    volumes:
      - ${GABI_DOU_DATA:-./.data/dou}:/data/gabi_dou

  frontend:
    build:
      context: .
      dockerfile: src/frontend/app/Dockerfile
    image: gabi-kimi-frontend
    container_name: gabi-kimi-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://backend:8000}
    ports:
      - "${FRONTEND_PORT:-8081}:8080"
