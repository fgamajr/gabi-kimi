# GABI - Docker Compose
#
# INFRASTRUCTURE (sempre ativo):
#   - Postgres, Elasticsearch, Redis
#
# APPS (opcional - use --profile):
#   - Gabi.Api:     docker compose --profile api up -d
#   - Gabi.Worker:  docker compose --profile worker up -d
#
# FLY.IO: deploy de API e Worker são apps separados (ver docs/infrastructure/FLY_DEPLOY.md).
#
# USO:
#   ./scripts/dev-up.sh              # Inicia infra
#   dotnet run --project src/Gabi.Api  # Roda API no host (:5100)

services:
  # PostgreSQL - Banco de dados principal
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gabi
      POSTGRES_PASSWORD: gabi_dev_password
      POSTGRES_DB: gabi
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"  # Porta 5433 no host para evitar conflitos
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gabi -d gabi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Nota: deploy.resources só é aplicado em Docker Swarm; em compose puro serve como documentação.
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # Elasticsearch - Motor de busca
  elasticsearch:
    image: elasticsearch:8.11.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # Redis - Cache e filas
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"   # 6380 no host para não conflitar com Redis do sistema (interno: redis:6379)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # Gabi.Api - REST API (optional, for full-docker development)
  # Usage: docker compose --profile api up -d
  api:
    build:
      context: .
      dockerfile: src/Gabi.Api/Dockerfile
    restart: unless-stopped
    ports:
      - "5100:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - GABI_SOURCES_PATH=/app/sources_v2.yaml
      - GABI_RUN_MIGRATIONS=true
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=gabi;Username=gabi;Password=gabi_dev_password
      - Gabi__ElasticsearchUrl=http://elasticsearch:9200
      - Gabi__RedisUrl=redis://redis:6379/0
    volumes:
      - ./sources_v2.yaml:/app/sources_v2.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    profiles:
      - api

  # Gabi.Worker - Background worker (discovery, fetch, jobs)
  # Usage: docker compose --profile worker up -d
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=gabi;Username=gabi;Password=gabi_dev_password
      - GABI_SOURCES_PATH=/app/sources_v2.yaml
      - Gabi__ElasticsearchUrl=http://elasticsearch:9200
      - Gabi__RedisUrl=redis://redis:6379/0
      - WorkerPool__WorkerCount=1
    volumes:
      - ./sources_v2.yaml:/app/sources_v2.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    profiles:
      - worker

# Volumes persistentes
volumes:
  postgres_data:
    driver: local
  elasticsearch_data:
    driver: local
  redis_data:
    driver: local
