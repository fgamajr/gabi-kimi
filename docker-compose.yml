# GABI - Docker Compose Unificado
# 
# Usage:
#   docker compose up -d              # No services (profile required)
#   docker compose --profile infra up -d    # Infrastructure only
#   docker compose --profile all up -d      # Full stack (infra + app)
#
# Version: 2.0.0 (Unified)

services:
  # ============================================================================
  # INFRASTRUCTURE SERVICES (profiles: infra, all)
  # ============================================================================
  
  postgres:
    image: pgvector/pgvector:pg15
    container_name: gabi-postgres
    restart: unless-stopped
    profiles: ["infra", "all"]
    environment:
      POSTGRES_USER: ${GABI_POSTGRES_USER:-gabi}
      POSTGRES_PASSWORD: ${GABI_POSTGRES_PASSWORD:-gabi_dev_password}
      POSTGRES_DB: ${GABI_POSTGRES_DB:-gabi}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${GABI_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GABI_POSTGRES_USER:-gabi} -d ${GABI_POSTGRES_DB:-gabi}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gabi-network
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements,pgvector
      - -c
      - max_connections=200
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: gabi-elasticsearch
    restart: unless-stopped
    profiles: ["infra", "all"]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - cluster.name=gabi-local
      - node.name=gabi-es-node-1
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - http.port=9200
      - http.host=0.0.0.0
    ports:
      - "${GABI_ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - gabi-network
    ulimits:
      memlock:
        soft: -1
        hard: -1

  redis:
    image: redis:7-alpine
    container_name: gabi-redis
    restart: unless-stopped
    profiles: ["infra", "all"]
    command: >
      sh -c '
      echo "appendonly yes" >> /etc/redis.conf &&
      echo "appendfsync everysec" >> /etc/redis.conf &&
      echo "auto-aof-rewrite-percentage 100" >> /etc/redis.conf &&
      echo "auto-aof-rewrite-min-size 64mb" >> /etc/redis.conf &&
      echo "maxmemory 512mb" >> /etc/redis.conf &&
      echo "maxmemory-policy allkeys-lru" >> /etc/redis.conf &&
      redis-server /etc/redis.conf
      '
    ports:
      - "${GABI_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - gabi-network

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:1.4
    container_name: gabi-tei
    restart: unless-stopped
    profiles: ["infra", "all"]
    environment:
      - MODEL_ID=sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      - PORT=8080
      - MAX_CONCURRENT_REQUESTS=512
      - MAX_BATCH_TOKENS=16384
      - HF_API_OFFLINE=0
    ports:
      - "${GABI_TEI_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - gabi-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # ============================================================================
  # APPLICATION SERVICES (profiles: all only)
  #   These services require infrastructure to be running.
  #   Use --profile all to start everything together with proper dependencies.
  # ============================================================================
  
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: gabi-api
    restart: unless-stopped
    profiles: ["all"]
    environment:
      GABI_ENVIRONMENT: local
      GABI_DEBUG: "true"
      GABI_LOG_LEVEL: debug
      GABI_DATABASE_URL: postgresql+asyncpg://gabi:gabi_dev_password@postgres:5432/gabi
      GABI_DATABASE_POOL_SIZE: 10
      GABI_DATABASE_MAX_OVERFLOW: 20
      GABI_DATABASE_ECHO: "false"
      GABI_ELASTICSEARCH_URL: http://elasticsearch:9200
      GABI_ELASTICSEARCH_INDEX: gabi_documents_v1
      GABI_REDIS_URL: redis://redis:6379/0
      GABI_REDIS_DLQ_DB: 1
      GABI_REDIS_CACHE_DB: 2
      GABI_REDIS_LOCK_DB: 3
      GABI_EMBEDDINGS_URL: http://tei:8080
      GABI_EMBEDDINGS_MODEL: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      GABI_EMBEDDINGS_DIMENSIONS: 384
      GABI_EMBEDDINGS_BATCH_SIZE: 32
      GABI_AUTH_ENABLED: "false"
      GABI_API_HOST: 0.0.0.0
      GABI_API_PORT: 8000
      GABI_API_RELOAD: "true"
      GABI_CORS_ORIGINS: "http://localhost:3000,http://localhost:8080"
      GABI_RATE_LIMIT_ENABLED: "false"
      GABI_MCP_ENABLED: "true"
      GABI_MCP_PORT: 8001
      GABI_PIPELINE_CONCURRENCY: 2
      GABI_SOURCES_PATH: /app/sources.yaml
    ports:
      - "${GABI_API_PORT:-8000}:8000"
      - "${GABI_MCP_PORT:-8001}:8001"
    volumes:
      - ./src:/app/src:ro
      - ./sources.yaml:/app/sources.yaml:ro
      - ./alembic:/app/alembic:ro
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      tei:
        condition: service_healthy
    networks:
      - gabi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: gabi-worker
    restart: unless-stopped
    profiles: ["all"]
    command: >
      celery -A gabi.worker worker
      --loglevel=info
      --concurrency=2
      --prefetch-multiplier=1
      --task-events
      --without-heartbeat
    environment:
      GABI_ENVIRONMENT: local
      GABI_DEBUG: "true"
      GABI_LOG_LEVEL: info
      GABI_DATABASE_URL: postgresql+asyncpg://gabi:gabi_dev_password@postgres:5432/gabi
      GABI_ELASTICSEARCH_URL: http://elasticsearch:9200
      GABI_ELASTICSEARCH_INDEX: gabi_documents_v1
      GABI_REDIS_URL: redis://redis:6379/0
      GABI_REDIS_DLQ_DB: 1
      GABI_REDIS_CACHE_DB: 2
      GABI_REDIS_LOCK_DB: 3
      GABI_EMBEDDINGS_URL: http://tei:8080
      GABI_EMBEDDINGS_MODEL: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      GABI_EMBEDDINGS_DIMENSIONS: 384
      GABI_EMBEDDINGS_BATCH_SIZE: 32
      GABI_AUTH_ENABLED: "false"
      GABI_PIPELINE_CONCURRENCY: 2
      GABI_PIPELINE_MAX_MEMORY_MB: 2048
      GABI_PIPELINE_FETCH_MAX_SIZE_MB: 50
      GABI_SOURCES_PATH: /app/sources.yaml
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./src:/app/src:ro
      - ./sources.yaml:/app/sources.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      tei:
        condition: service_healthy
    networks:
      - gabi-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/postgres
  
  elasticsearch_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/elasticsearch
  
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/redis

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  gabi-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
