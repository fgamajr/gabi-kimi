version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - MONGO_STRING=${MONGO_STRING}
      - DB_NAME=${DB_NAME}
      - ES_URL=${ES_URL}
      - ES_INDEX=${ES_INDEX}
      - DOU_DATA_PATH=${DOU_DATA_PATH}
      - ICLOUD_DATA_PATH=${ICLOUD_DATA_PATH}
    depends_on:
      - mongo
      - elasticsearch

  frontend:
    build:
      context: ./src/frontend/app
    ports:
      - "8080:8080"
    volumes:
      - ./src/frontend/app:/app
      - /app/node_modules

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.4
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data

volumes:
  mongo_data:
  es_data: