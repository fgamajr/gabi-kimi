# Fly.io — GABI Web Server (FastAPI)
# DOU search platform frontend + API

app = 'gabi-dou-web'
primary_region = 'gru'

[build]
  dockerfile = 'deploy/web/Dockerfile'

[env]
  # DB connection — internal Fly networking (6PN)
  PG_DSN = 'host=gabi-dou-db.internal port=5432 dbname=gabi user=gabi'
  # PG password comes from fly secrets

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size = 'shared-cpu-2x'
  memory = '512mb'
