apiVersion: v1
kind: ConfigMap
metadata:
  name: gabi-config
  namespace: gabi
data:
  # Application
  APP_ENV: "production"
  APP_NAME: "GABI API"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  
  # API
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_WORKERS: "4"
  
  # CORS
  CORS_ORIGINS: "https://gabi.example.com,https://app.gabi.example.com"
  
  # Upload
  MAX_UPLOAD_SIZE_MB: "50"
  UPLOAD_TIMEOUT_SECONDS: "300"
  UPLOAD_CHUNK_SIZE_MB: "5"
  
  # LLM Configuration
  LLM_PROVIDER: "openai"
  LLM_MODEL: "gpt-4o"
  LLM_TEMPERATURE: "0.1"
  LLM_MAX_TOKENS: "4096"
  LLM_REQUEST_TIMEOUT: "120"
  
  # Embedding
  EMBEDDING_PROVIDER: "openai"
  EMBEDDING_MODEL: "text-embedding-3-small"
  EMBEDDING_DIMENSIONS: "1536"
  EMBEDDING_BATCH_SIZE: "100"
  
  # Vector DB
  VECTOR_DB_HOST: "elasticsearch.gabi.svc.cluster.local"
  VECTOR_DB_PORT: "9200"
  VECTOR_DB_SCHEME: "http"
  VECTOR_DB_INDEX_NAME: "documents"
  VECTOR_DB_SHARDS: "3"
  VECTOR_DB_REPLICAS: "1"
  VECTOR_DB_VERIFY_CERTS: "false"
  
  # Cache
  REDIS_HOST: "redis.gabi.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_SSL: "false"
  CACHE_TTL_SECONDS: "3600"
  
  # Celery
  CELERY_BROKER_URL: "redis://redis.gabi.svc.cluster.local:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis.gabi.svc.cluster.local:6379/1"
  CELERY_WORKER_CONCURRENCY: "4"
  CELERY_TASK_TIME_LIMIT: "3600"
  CELERY_TASK_SOFT_TIME_LIMIT: "3300"
  
  # Database
  DATABASE_POOL_SIZE: "20"
  DATABASE_MAX_OVERFLOW: "10"
  DATABASE_POOL_TIMEOUT: "30"
  DATABASE_POOL_RECYCLE: "3600"
  
  # Security
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"
  MAX_QUERY_LENGTH: "1000"
  SESSION_TIMEOUT_MINUTES: "60"
  
  # Monitoring
  METRICS_ENABLED: "true"
  METRICS_PORT: "9090"
  HEALTH_CHECK_TIMEOUT: "5"
  
  # Document Processing
  DOCUMENT_MAX_PAGES: "1000"
  DOCUMENT_OCR_ENABLED: "true"
  CHUNK_SIZE: "500"
  CHUNK_OVERLAP: "50"
  MAX_CHUNKS_PER_DOC: "1000"
  
  # Q&A
  QA_MAX_CONTEXT_DOCS: "5"
  QA_MIN_CONFIDENCE: "0.7"
  QA_MAX_FOLLOWUP_QUESTIONS: "3"
