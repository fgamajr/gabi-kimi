# kind: SealedSecret
# metadata:
#   name: gabi-secrets
#   namespace: gabi
# spec:
#   encryptedData:
#     DATABASE_URL: AgByA...encrypted...
#     OPENAI_API_KEY: AgByA...encrypted...
