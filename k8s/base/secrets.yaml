apiVersion: v1
kind: Secret
metadata:
  name: gabi-secrets
  namespace: gabi
  annotations:
    # Este Secret deve ser gerenciado por External Secrets Operator
    # ou substituído por Sealed Secrets / Vault Injector
    external-secrets.io/provider: "aws-secrets-manager"
    external-secrets.io/secret-name: "gabi/production/secrets"
type: Opaque
data:
  # Estes valores são placeholders base64.
  # NUNCA commite valores reais neste arquivo!
  # Use uma das opções abaixo para gerenciar secrets:
  #
  # Opção 1: External Secrets Operator (recomendado)
  #   - Configura em k8s/overlays/production/external-secret.yaml
  #
  # Opção 2: Sealed Secrets (GitOps)
  #   - Use: kubeseal --scope cluster < secret.yaml > sealed-secret.yaml
  #
  # Opção 3: Vault Injector
  #   - Configure vault.hashicorp.com/agent-inject annotations
  #
  # Opção 4: Manual (não recomendado para produção)
  #   - kubectl create secret generic gabi-secrets --from-env-file=.env

  # Database - deve ser configurado via external secret
  DATABASE_URL: ""
  DB_PASSWORD: ""
  
  # API Keys
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  
  # Security
  SECRET_KEY: ""
  JWT_SECRET: ""
  
  # Vector DB (Elasticsearch)
  VECTOR_DB_USERNAME: ""
  VECTOR_DB_PASSWORD: ""
  
  # Redis
  REDIS_PASSWORD: ""
  
  # OAuth (optional)
  OAUTH_GOOGLE_CLIENT_ID: ""
  OAUTH_GOOGLE_CLIENT_SECRET: ""
  OAUTH_GITHUB_CLIENT_ID: ""
  OAUTH_GITHUB_CLIENT_SECRET: ""
  
  # External Services
  S3_ACCESS_KEY: ""
  S3_SECRET_KEY: ""
  STRIPE_API_KEY: ""
  SENDGRID_API_KEY: ""
---
# ExternalSecret definition for AWS Secrets Manager
# Descomente e configure se usando External Secrets Operator
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: gabi-secrets
#   namespace: gabi
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     kind: ClusterSecretStore
#     name: aws-secrets-manager
#   target:
#     name: gabi-secrets
#     creationPolicy: Owner
#   dataFrom:
#   - extract:
#       key: gabi/production/secrets
---
# Sealed Secret example (for GitOps with Sealed Secrets)
# Use kubeseal to encrypt:
#   kubectl create secret generic gabi-secrets \
#     --from-literal=DATABASE_URL=postgresql://... \
#     --from-literal=OPENAI_API_KEY=sk-... \
#     --dry-run=client -o yaml | \
#     kubeseal --scope cluster -o yaml > sealed-secret.yaml
