apiVersion: apps/v1
kind: Deployment
metadata:
  name: gabi-worker
  namespace: gabi
  labels:
    app: gabi-worker
    component: worker
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: gabi-worker
      component: worker
  template:
    metadata:
      labels:
        app: gabi-worker
        component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: gabi-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
      - name: wait-for-db
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z postgres.gabi.svc.cluster.local 5432; do echo waiting for postgres; sleep 2; done;']
      - name: wait-for-es
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z elasticsearch.gabi.svc.cluster.local 9200; do echo waiting for elasticsearch; sleep 2; done;']
      - name: wait-for-redis
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z redis.gabi.svc.cluster.local 6379; do echo waiting for redis; sleep 2; done;']
      containers:
      - name: worker
        image: gabi-api:latest
        imagePullPolicy: Always
        command: ["celery", "-A", "gabi.worker", "worker"]
        args:
        - --loglevel=info
        - --concurrency=4
        - -Q
        - gabi.default,gabi.sync,gabi.dlq,gabi.health,gabi.alerts
        - -n
        - worker@%h
        ports:
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: gabi-config
        - secretRef:
            name: gabi-secrets
        env:
        - name: PYTHONPATH
          value: "/app/src"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: WORKER_CONCURRENCY
          value: "4"
        - name: WORKER_PREFETCH_MULTIPLIER
          value: "1"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: uploads
          mountPath: /app/uploads
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "8Gi"
            cpu: "4"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - celery -A gabi.worker inspect ping -d worker@$HOSTNAME || exit 1
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - celery -A gabi.worker inspect ping -d worker@$HOSTNAME || exit 1
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 30"]
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: tmp
        emptyDir: {}
      - name: uploads
        persistentVolumeClaim:
          claimName: gabi-uploads
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - gabi-worker
              topologyKey: kubernetes.io/hostname
---
# Celery Beat for scheduled tasks
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gabi-beat
  namespace: gabi
  labels:
    app: gabi-beat
    component: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gabi-beat
      component: scheduler
  template:
    metadata:
      labels:
        app: gabi-beat
        component: scheduler
    spec:
      serviceAccountName: gabi-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
      - name: wait-for-redis
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z redis.gabi.svc.cluster.local 6379; do echo waiting for redis; sleep 2; done;']
      containers:
      - name: beat
        image: gabi-api:latest
        command: ["celery", "-A", "gabi.worker", "beat"]
        args:
        - --loglevel=info
        - --scheduler
        - celery.beat.PersistentScheduler
        envFrom:
        - configMapRef:
            name: gabi-config
        - secretRef:
            name: gabi-secrets
        volumeMounts:
        - name: celerybeat-schedule
          mountPath: /tmp/celerybeat-schedule
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: celerybeat-schedule
        emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gabi-worker
  namespace: gabi
  labels:
    app: gabi-worker
automountServiceAccountToken: false
