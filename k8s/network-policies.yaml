apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: gabi
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# Allow API ingress from ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gabi-api-ingress
  namespace: gabi
spec:
  podSelector:
    matchLabels:
      app: gabi-api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - namespaceSelector:
        matchLabels:
          name: istio-system
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 9090
---
# Allow API to access external services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gabi-api-egress
  namespace: gabi
spec:
  podSelector:
    matchLabels:
      app: gabi-api
  policyTypes:
  - Egress
  egress:
  # Allow DNS
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow internal services
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    - podSelector:
        matchLabels:
          app: elasticsearch
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 9200
    - protocol: TCP
      port: 6379
  # Allow internet for OpenAI API
  - to: []
    ports:
    - protocol: TCP
      port: 443
---
# Allow workers
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gabi-worker-egress
  namespace: gabi
spec:
  podSelector:
    matchLabels:
      app: gabi-worker
  policyTypes:
  - Egress
  egress:
  # DNS
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Internal services
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    - podSelector:
        matchLabels:
          app: elasticsearch
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 9200
    - protocol: TCP
      port: 6379
  # Internet for OpenAI API
  - to: []
    ports:
    - protocol: TCP
      port: 443
---
# Allow Prometheus scraping
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gabi-prometheus-ingress
  namespace: gabi
spec:
  podSelector:
    matchLabels:
      app: gabi-api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 9090
---
# Database policy - only allow from API and Worker
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-ingress
  namespace: gabi
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: gabi-api
    - podSelector:
        matchLabels:
          app: gabi-worker
    - podSelector:
        matchLabels:
          app: gabi-beat
    ports:
    - protocol: TCP
      port: 5432
---
# Elasticsearch policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: elasticsearch-ingress
  namespace: gabi
spec:
  podSelector:
    matchLabels:
      app: elasticsearch
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: gabi-api
    - podSelector:
        matchLabels:
          app: gabi-worker
    - podSelector:
        matchLabels:
          app: elasticsearch
    ports:
    - protocol: TCP
      port: 9200
    - protocol: TCP
      port: 9300
---
# Redis policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-ingress
  namespace: gabi
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: gabi-api
    - podSelector:
        matchLabels:
          app: gabi-worker
    - podSelector:
        matchLabels:
          app: gabi-beat
    ports:
    - protocol: TCP
      port: 6379
