apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gabi-api-metrics
  namespace: gabi
  labels:
    app: gabi-api
    component: monitoring
spec:
  namespaceSelector:
    matchNames:
      - gabi
  selector:
    matchLabels:
      app: gabi-api
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gabi-worker-metrics
  namespace: gabi
  labels:
    app: gabi-worker
    component: monitoring
spec:
  namespaceSelector:
    matchNames:
      - gabi
  selector:
    matchLabels:
      app: gabi-worker
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
