# GABI Pipeline Configuration Schema
# ===================================
#
# This YAML file configures the automated DOU ingestion pipeline.
# Copy this file to config/production.yaml and customize for your environment.

# ---------------------------------------------------------------------------
# Data Directory
# ---------------------------------------------------------------------------

data_dir: "data/inlabs"  # Directory for ZIP downloads and extractions


# ---------------------------------------------------------------------------
# Database Configuration
# ---------------------------------------------------------------------------

database:
  # PostgreSQL connection string
  # Can also be set via GABI_DSN environment variable
  dsn: "host=localhost port=5433 dbname=gabi user=gabi password=gabi"


# ---------------------------------------------------------------------------
# Discovery Configuration
# ---------------------------------------------------------------------------

discovery:
  # Automatically discover new DOU publications
  auto_discover: true

  # Number of days to look back when discovering new publications
  lookback_days: 1

  # Sections to discover (null = all regular sections: do1, do2, do3)
  # To discover extra editions, include: do1e, do2e, do3e
  sections: null


# ---------------------------------------------------------------------------
# Download Configuration
# ---------------------------------------------------------------------------

download:
  # Sections to download (null = all sections including extras)
  sections: null

  # Whether to probe for extra editions (DO1E, DO2E, DO3E, etc.)
  include_extras: true

  # Skip downloading ZIPs that already exist on disk
  skip_existing: true

  # Maximum number of concurrent downloads (not yet implemented)
  max_concurrent: 1


# ---------------------------------------------------------------------------
# Ingestion Configuration
# ---------------------------------------------------------------------------

ingestion:
  # Seal each batch with CRSS-1 cryptographic commitment
  seal_commitment: true

  # Path to sources YAML file (for commitment schema)
  sources_yaml: "sources_v3.yaml"

  # Path to identity YAML file (for identity analysis)
  identity_yaml: "sources_v3.identity-test.yaml"


# ---------------------------------------------------------------------------
# Error Handling Configuration
# ---------------------------------------------------------------------------

error_handling:
  # Maximum number of retry attempts for failed operations
  max_retries: 3

  # Delay between retries (seconds)
  retry_delay_seconds: 300

  # Whether to stop on first error or continue
  stop_on_error: false


# ---------------------------------------------------------------------------
# Reporting Configuration
# ---------------------------------------------------------------------------

reporting:
  # Generate JSON report after each pipeline run
  generate_report: true

  # Path to write report file (timestamp will be appended)
  report_output: "logs/pipeline_report.json"

  # Whether to log to stdout
  log_to_stdout: true

  # Log level: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"


