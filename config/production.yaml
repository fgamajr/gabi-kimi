# GABI Production Pipeline Configuration
# =======================================
#
# This is the production configuration for the automated DOU ingestion pipeline.
# Customize the values below for your production environment.

data_dir: "/opt/gabi/data/inlabs"

database:
  dsn: "${GABI_DSN}"

discovery:
  auto_discover: true
  lookback_days: 1
  sections: null

download:
  sections: null
  include_extras: true
  skip_existing: true
  max_concurrent: 1

ingestion:
  seal_commitment: true
  sources_yaml: "/opt/gabi/sources_v3.yaml"
  identity_yaml: "/opt/gabi/sources_v3.identity-test.yaml"

error_handling:
  max_retries: 3
  retry_delay_seconds: 300
  stop_on_error: false

reporting:
  generate_report: true
  report_output: "/opt/gabi/logs/pipeline_$(date +%%Y-%%m-%%d_%%H-%%M-%%S).json"
  log_to_stdout: true
  log_level: "INFO"
