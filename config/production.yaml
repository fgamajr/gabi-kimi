# Last verified: 2026-03-06
# Example production config for src/backend/ingest/orchestrator.py.
# This file mirrors only the fields currently parsed by the code.

data_dir: "/opt/gabi/ops/data/inlabs"

database:
  dsn: "${GABI_DSN}"

discovery:
  auto_discover: true
  lookback_days: 1
  sections: null

download:
  sections: null
  include_extras: true
  skip_existing: true

ingestion:
  seal_commitment: true
  sources_yaml: "/opt/gabi/config/sources/sources_v3.yaml"
  identity_yaml: "/opt/gabi/config/sources/sources_v3.identity-test.yaml"

error_handling:
  max_retries: 3
  retry_delay_seconds: 300

reporting:
  generate_report: true
  report_output: "/opt/gabi/logs/pipeline_$(date +%%Y-%%m-%%d_%%H-%%M-%%S).json"
