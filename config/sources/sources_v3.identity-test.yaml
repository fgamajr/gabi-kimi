# Last verified: 2026-03-06
sources:
  dou:
    identity:
      mode: temporal_archive
      append_only: true
      overwrite_existing: false

      natural_key:
        strategies:
          - name: strict
            inputs:
              - document_type
              - document_number
              - document_year
              - issuing_organ_normalized

          - name: medium
            inputs:
              - document_type
              - document_number
              - issuing_organ_normalized

          - name: weak
            inputs:
              - title_normalized

          - name: fallback
            inputs:
              - body_text_first_200_chars_normalized

      hashes:
        natural_key_hash:
          algorithm: sha256
          from_strategy: first_non_empty

        content_hash:
          algorithm: sha256
          canonicalize:
            - remove_signature_blocks
            - normalize_whitespace
            - normalize_quotes
            - remove_page_headers
          inputs:
            - body_text_semantic

        occurrence_hash:
          algorithm: sha256
          inputs:
            - edition_id
            - page_number
            - source_url_canonical

      edition_id:
        inputs:
          - publication_date
          - edition_number
          - edition_section

      cardinality:
        natural_key_hash_to_content_hash: one_to_many
        content_hash_to_occurrence_hash: one_to_many

      constraints:
        unique:
          - occurrence_hash

      indexes:
        - natural_key_hash
        - content_hash
        - edition_id

      ingestion_policy:
        on_occurrence_hash_match: ignore_duplicate_event
        on_new_content_for_same_natural_key: create_new_version
        on_same_content_new_edition: register_new_publication
