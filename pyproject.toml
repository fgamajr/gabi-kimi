[tool.ruff]
target-version = "py312"
line-length = 120
exclude = ["._*", "*.pyc"]

[tool.ruff.lint]
# Allow module-level imports after code (e.g. lazy imports to avoid circular deps)
ignore = ["E402", "E501"]
select = ["E", "F"]

[tool.ruff.format]
skip-magic-trailing-comma = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
timeout = 60
